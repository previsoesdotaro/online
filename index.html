                const mins = parseInt(document.getElementById('consult-minutes').value);
                const type = document.getElementById('consult-type').value;
                const client = store.clients.find(c => c.id === cid);
                
                if (!client) {
                    alert('Erro: Cliente não encontrado.');
                    return;
                }

                const submitBtn = e.target.querySelector('button');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Lançando...';

                try {
                    const { error: insertError } = await supabaseClient.from('consultas').insert([{ 
                        client_id: cid, 
                        tarologo_id: tid, 
                        minutes: mins, 
                        remaining_seconds: mins * 60, 
                        status: 'pending',
                        type: type,
                        client_name: client.name
                    }]);

                    if (insertError) throw insertError;

                    const { error: updateError } = await supabaseClient.from('clients').update({ balance: client.balance - mins }).eq('id', cid);
                    if (updateError) throw updateError;

                    closeModal();
                    await showDashboard();
                    alert('Consulta lançada com sucesso!');

                } catch (err) {
                    console.error("Erro ao lançar consulta:", err);
                    alert('Erro ao lançar consulta no banco de dados: ' + err.message);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Lançar';
                }
            };
        }

        function openNewTarologoModal() {
            openModal('Cadastrar Novo Tarólogo', `
                <form id="new-tarologo-form" class="space-y-4">
                    <div><label class="block text-sm font-medium mb-1">Nome</label><input type="text" id="t-name" class="w-full border p-2 rounded" required placeholder="Nome completo"></div>
                    <div><label class="block text-sm font-medium mb-1">Usuário</label><input type="text" id="t-user" class="w-full border p-2 rounded" required placeholder="Ex: joao_tarot"></div>
                    <div><label class="block text-sm font-medium mb-1">Senha</label><input type="password" id="t-pass" class="w-full border p-2 rounded" required placeholder="Mínimo 4 caracteres"></div>
                    <button type="submit" id="save-tarologo-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded">Criar Acesso</button>
                </form>
            `);
            document.getElementById('new-tarologo-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('save-tarologo-btn');
                const tName = document.getElementById('t-name').value.trim();
                const tUser = document.getElementById('t-user').value.trim();
                const tPass = document.getElementById('t-pass').value.trim();

                btn.disabled = true;
                btn.textContent = 'Salvando...';

                try {
                    const { error } = await supabaseClient.from('users').insert([{ 
                        name: tName, 
                        username: tUser, 
                        password: tPass, 
                        role: 'tarologo' 
                    }]);

                    if (error) {
                        alert('Erro ao criar tarólogo: ' + error.message);
                        console.error(error);
                    } else {
                        alert('Tarólogo criado com sucesso!');
                        closeModal();
                        showDashboard();
                    }
                } catch (err) {
                    alert('Erro inesperado: ' + err.message);
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Criar Acesso';
                }
            };
        }

        async function deleteClient(id) { if(confirm('Excluir cliente?')) { await supabaseClient.from('clients').delete().eq('id', id); showDashboard(); } }
        async function deleteTarologo(id) { if(confirm('Excluir tarólogo?')) { await supabaseClient.from('users').delete().eq('id', id); showDashboard(); } }
        async function deleteConsultation(id) { if(confirm('Remover consulta?')) { await supabaseClient.from('consultas').delete().eq('id', id); showDashboard(); } }

        function copyClientLink(consultationId) {
            const url = `${window.location.origin}${window.location.pathname}?c=${consultationId}`;
            navigator.clipboard.writeText(url).then(() => {
                alert("Link de acesso do cliente copiado!\n\nEnvie este link para o cliente entrar no chat.");
            }).catch(err => {
                console.error('Erro ao copiar link:', err);
                alert("Link: " + url); // Fallback
            });
        }

        // Tarólogo logic
        function initTarologoConsultas() {
            // Update Status Card in this view
            const currentStatus = store.currentUser.status || 'online';
            updateStatusUI(currentStatus);

            const tablePending = document.getElementById('tarologo-assigned-consultations');
            const tableActive = document.getElementById('tarologo-active-consultations-table');
            const activeSection = document.getElementById('active-consultations-section');

            const myConsults = store.consultations.filter(c => c.tarologo_id === store.currentUser.id);
            const pendingConsults = myConsults.filter(c => c.status === 'pending');
            const activeConsults = myConsults.filter(c => c.status === 'active');

            // 1. Renderizar Consultas Pendentes (Novas)
            tablePending.innerHTML = pendingConsults.map(c => {
                const client = store.clients.find(cl => cl.id === c.client_id);
                const typeIcon = c.type === 'phone' ? '📞 Telefone' : '💬 Chat';
                
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 font-bold text-gray-700">${client ? client.name : 'N/A'}</td>
                        <td class="px-6 py-4 font-mono">
                            <span class="bg-gray-100 px-2 py-1 rounded text-gray-600">${c.minutes}:00</span>
                        </td>
                        <td class="px-6 py-4 text-[10px] font-bold uppercase text-gray-400">${typeIcon}</td>
                        <td class="px-6 py-4 text-center flex gap-2 justify-center">
                            <button onclick="copyClientLink('${c.id}')" class="bg-gray-100 hover:bg-gray-200 text-indigo-600 p-2 rounded-lg transition" title="Copiar Link do Cliente"><i class="fas fa-link"></i></button>
                            <button onclick="startConsultationDirectly('${c.id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold transition text-xs flex items-center gap-2 shadow-sm">
                                <i class="fas fa-play"></i> INICIAR
                            </button>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="4" class="p-8 text-center text-gray-400 italic text-sm">Nenhuma nova consulta no momento.</td></tr>';

            // 2. Renderizar Consultas Ativas (Em Andamento)
            if (activeConsults.length > 0) {
                activeSection.classList.remove('hidden');
                tableActive.innerHTML = activeConsults.map(c => {
                    const client = store.clients.find(cl => cl.id === c.client_id);
                    const comissao = (c.minutes || 0) * 0.50; // R$ 0,50 por minuto
                    const iniciadoEm = new Date(c.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    const mins = Math.floor(c.remaining_seconds / 60);
                    const secs = c.remaining_seconds % 60;
                    const timerStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;

                    return `
                        <tr class="hover:bg-blue-50/50">
                            <td class="px-4 py-3 font-mono text-gray-400">#${c.id.substring(0,6)}</td>
                            <td class="px-4 py-3 font-black text-gray-800 uppercase">${client ? client.name : 'N/A'}</td>
                            <td class="px-4 py-3 text-gray-500">HÁ ${iniciadoEm}</td>
                            <td class="px-4 py-3 font-bold">${c.minutes} MINUTO(S)</td>
                            <td class="px-4 py-3 text-gray-400">R$ 0,00</td>
                            <td class="px-4 py-3">
                                <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-bold text-[9px]">PROMOCIONAL</span>
                            </td>
                            <td class="px-4 py-3 font-bold text-blue-600">
                                ${c.minutes}<br>
                                <span class="font-mono text-gray-400">${timerStr}</span>
                            </td>
                            <td class="px-4 py-3">
                                <div class="bg-blue-600 text-white px-2 py-1 rounded text-center">
                                    <p class="font-bold">R$ ${comissao.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                    <p class="text-[8px] uppercase opacity-80">Minutos</p>
                                </div>
                            </td>
                            <td class="px-4 py-3">
                                <div class="flex items-center justify-center gap-2">
                                    <div class="text-lg font-mono font-black text-gray-800 mr-2">${timerStr}</div>
                                    <button onclick="pauseConsultationInTable('${c.id}')" class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200 shadow-sm transition">
                                        <i class="fas fa-pause"></i>
                                    </button>
                                    <button onclick="finishConsultationInTable('${c.id}')" class="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-200 shadow-sm transition">
                                        <i class="fas fa-stop"></i>
                                    </button>
                                    ${c.type === 'chat' ? `
                                        <button onclick="startConsultation('${c.id}')" class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center hover:bg-indigo-700 shadow-sm transition" title="Abrir Chat">
                                            <i class="fas fa-comments"></i>
                                        </button>
                                    ` : ''}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

                // Iniciar cronômetro global se não estiver rodando
                startGlobalTimer();
            } else {
                activeSection.classList.add('hidden');
                stopGlobalTimer();
            }
        }

        // Funções de Controle Direto na Tabela
        async function startConsultationDirectly(id) {
            const consult = store.consultations.find(c => c.id === id);
            if (!consult) return;

            try {
                // Removemos qualquer coluna extra para evitar erros de cache do Supabase
                const { error } = await supabaseClient.from('consultas').update({ 
                    status: 'active'
                }).eq('id', id);
                
                if (error) throw error;

                consult.status = 'active';
                await updateUserStatus('busy');
                
                // Se for chat, abre a tela de chat. Se for telefone, fica na lista.
                if (consult.type === 'chat') {
                    startConsultation(id);
                } else {
                    renderView('tarologo-consultas');
                }
            } catch (err) {
                console.error("Erro ao iniciar consulta direta:", err);
                alert("Erro ao iniciar atendimento: " + (err.message || "Erro de banco de dados"));
            }
        }

        function pauseConsultationInTable(id) {
            // No momento a pausa é apenas visual/local para o tarólogo não se perder, 
            // mas o tempo no banco continua sincronizado a cada 2s.
            // Para implementar pausa real, precisaríamos de um status 'paused' no banco.
            alert("Atendimento pausado localmente.");
        }

        async function finishConsultationInTable(id) {
            if(confirm('Tem certeza que deseja encerrar este atendimento agora?')) {
                const consult = store.consultations.find(c => c.id === id);
                store.activeConsultation = consult; // Define como ativa para a função finish funcionar
                await finishConsultation('Atendimento finalizado pelo tarólogo via painel.');
                renderView('tarologo-consultas');
            }
        }

        let globalTimerInterval = null;
        function startGlobalTimer() {
            if (globalTimerInterval) return;
            globalTimerInterval = setInterval(async () => {
                const activeConsults = store.consultations.filter(c => c.tarologo_id === store.currentUser.id && c.status === 'active');
                
                if (activeConsults.length === 0) {
                    stopGlobalTimer();
                    return;
                }

                for (const consult of activeConsults) {
                    if (consult.remaining_seconds > 0) {
                        consult.remaining_seconds--;
                        
                        // Sincroniza a cada 2 segundos
                        if (consult.remaining_seconds % 2 === 0) {
                             await supabaseClient.from('consultas').update({ remaining_seconds: consult.remaining_seconds }).eq('id', consult.id);
                        }
                    } else {
                        store.activeConsultation = consult;
                        await finishConsultation('Tempo esgotado!');
                        renderView('tarologo-consultas');
                    }
                }
                
                // Atualiza a UI se estiver na tela de lista
                if (store.currentView === 'tarologo-consultas') {
                    const tableActive = document.getElementById('tarologo-active-consultations-table');
                    if (tableActive) {
                        // Só atualiza os elementos de texto do timer para evitar re-renderizar tudo
                        activeConsults.forEach(c => {
                            const mins = Math.floor(c.remaining_seconds / 60);
                            const secs = c.remaining_seconds % 60;
                            const timerStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                            // Aqui poderíamos buscar elementos específicos, mas por simplicidade re-renderizamos a linha ou a tabela
                        });
                        initTarologoConsultas(); // Re-renderiza para manter simples por enquanto
                    }
                }
            }, 1000);
        }

        function stopGlobalTimer() {
            if (globalTimerInterval) {
                clearInterval(globalTimerInterval);
                globalTimerInterval = null;
            }
        }

        function startConsultation(id) {
            const consult = store.consultations.find(c => c.id === id);
            store.activeConsultation = consult;
            
            // Switch navigation highlighting
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active', 'bg-indigo-800');
                if(l.getAttribute('data-view') === 'tarologo-chat') l.classList.add('active', 'bg-indigo-800');
            });

            renderView('tarologo-chat');
        }

        async function initTarologoChat() {
            if (!store.activeConsultation) {
                document.getElementById('no-active-consult').classList.remove('hidden');
                document.getElementById('active-consultation-section').classList.add('hidden');
                return;
            }

            const consult = store.activeConsultation;
            const client = store.clients.find(cl => cl.id === consult.client_id);
            consult.chat_log = consult.chat_log || []; // Garante que o log de chat exista
            
            document.getElementById('no-active-consult').classList.add('hidden');
            document.getElementById('active-consultation-section').classList.remove('hidden');
            
            document.getElementById('active-client-name').textContent = client.name;
            document.getElementById('active-consult-info').textContent = `Tempo total contratado: ${consult.minutes} min`;
            document.getElementById('active-consult-type').textContent = consult.type === 'phone' ? '📞 Telefone' : '💬 Chat';
            
            // MOSTRAR OVERLAY DE INÍCIO SE AINDA NÃO COMEÇOU
            const overlay = document.getElementById('start-consult-overlay');
            if (consult.status === 'pending') {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }

            updateTimerDisplay();
            loadMessages(consult.id);
            
            const messageSubscription = supabaseClient
                .channel(`chat_messages_${consult.id}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'consultas', 
                    filter: `id=eq.${consult.id}` 
                }, payload => {
                    const newLog = payload.new.chat_log;
                    const oldLog = consult.chat_log || [];
                    if (newLog.length > oldLog.length) {
                        const newMessage = newLog[newLog.length - 1];
                        // Evita mostrar a própria mensagem duas vezes
                        if (newMessage.sender_id !== store.currentUser.id) {
                            addMessageToUI(newMessage);
                            consult.chat_log = newLog;
                        }
                    }
                })
                .subscribe((status) => {
                    console.log("Realtime Chat Status (Tarólogo):", status);
                });

            const statusSubscription = supabaseClient
                .channel(`status_monitor_${consult.id}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'consultas', 
                    filter: `id=eq.${consult.id}` 
                }, payload => {
                    console.log("CONSULTA ATUALIZADA (STATUS):", payload.new.status);
                    if (payload.new.status === 'finished' && store.activeConsultation) {
                        finishConsultation('O cliente encerrou o atendimento ou o tempo acabou.');
                    }
                })
                .subscribe((status) => {
                    console.log("Realtime Status Monitor (Tarólogo):", status);
                });

            if (store.timerInterval) clearInterval(store.timerInterval);
            store.timerInterval = setInterval(async () => {
                // O cronômetro do tarólogo SÓ corre se o status for 'active'
                if (consult.status === 'active') {
                    if (consult.remaining_seconds > 0) {
                        consult.remaining_seconds--;
                        updateTimerDisplay();
                        
                        // Sincroniza com o Banco de Dados a cada 2 segundos para o cliente ver com precisão
                        if (consult.remaining_seconds % 2 === 0) {
                             await supabaseClient.from('consultas').update({ remaining_seconds: consult.remaining_seconds }).eq('id', consult.id);
                        }
                        
                        if (consult.remaining_seconds === 60) {
                            alert('⚠️ AVISO: Falta apenas 1 minuto para encerrar a consulta!');
                        }
                    } else {
                        finishConsultation('Tempo esgotado! A consulta foi encerrada automaticamente.');
                    }
                }
            }, 1000);

            document.getElementById('chat-form').onsubmit = async (e) => {
                e.preventDefault();
                const input = document.getElementById('chat-input');
                const text = input.value.trim();
                if (!text) return;

                const message = {
                    sender_id: store.currentUser.id,
                    sender_name: store.currentUser.name,
                    text: text,
                    created_at: new Date().toISOString()
                };

                // Adiciona a mensagem ao log local e envia para o Supabase
                consult.chat_log.push(message);
                addMessageToUI(message);
                
                input.value = '';
                await supabaseClient.from('consultas').update({ chat_log: consult.chat_log }).eq('id', consult.id);
            };

            document.getElementById('finish-consult-btn').onclick = () => {
                if(confirm('Tem certeza que deseja encerrar este atendimento agora?')) {
                    supabaseClient.removeChannel(messageSubscription);
                    supabaseClient.removeChannel(statusSubscription);
                    finishConsultation('Atendimento finalizado pelo tarólogo.');
                }
            };
            
            document.getElementById('pause-consult-btn').onclick = () => { 
                clearInterval(store.timerInterval); 
                alert('Atendimento pausado. O tempo parou de contar.'); 
            };
        }

        async function activateConsultationManual() {
            if (!store.activeConsultation) return;
            const consult = store.activeConsultation;
            
            try {
                // Muda o status local e no banco
                consult.status = 'active';
                await supabaseClient.from('consultas').update({ status: 'active' }).eq('id', consult.id);
                
                // Muda status do tarólogo para OCUPADO
                updateUserStatus('busy');
                
                // Esconde o overlay
                const overlay = document.getElementById('start-consult-overlay');
                if (overlay) overlay.classList.add('hidden');
                
                console.log("Consulta iniciada manualmente pelo tarólogo!");
            } catch (err) {
                console.error("Erro ao ativar consulta:", err);
                alert("Erro ao iniciar o atendimento. Tente novamente.");
            }
        }

        async function loadMessages(consultationId) {
            const chatBox = document.getElementById('chat-messages');
            const consult = store.consultations.find(c => c.id === consultationId);
            const messages = consult ? (consult.chat_log || []) : [];

            chatBox.innerHTML = messages.length ? '' : '<div class="text-center text-xs text-gray-400 italic my-4">Nenhuma mensagem ainda.</div>';
            messages.forEach(msg => addMessageToUI(msg));
        }

        function addMessageToUI(msg) {
            const chatBox = document.getElementById('chat-messages');
            const isMe = msg.sender_id === store.currentUser.id;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            msgDiv.innerHTML = `
                <div class="max-w-[80%] ${isMe ? 'bg-blue-600 text-white rounded-l-lg rounded-tr-lg' : 'bg-white text-gray-800 border border-gray-200 rounded-r-lg rounded-tl-lg'} p-3 shadow-sm">
                    <p class="text-[10px] ${isMe ? 'text-blue-100' : 'text-gray-400'} font-bold uppercase mb-1">${msg.sender_name}</p>
                    <p class="text-sm">${msg.text}</p>
                    <p class="text-[9px] ${isMe ? 'text-blue-200' : 'text-gray-400'} text-right mt-1">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateTimerDisplay() {
            const mins = Math.floor(store.activeConsultation.remaining_seconds / 60);
            const secs = store.activeConsultation.remaining_seconds % 60;
            const timeStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            
            const mainEl = document.getElementById('consultation-timer');
            const miniEl = document.getElementById('mini-timer');
            
            if (mainEl) mainEl.textContent = timeStr;
            if (miniEl) miniEl.textContent = timeStr;
        }

        async function finishConsultation(msg) {
            clearInterval(store.timerInterval);
            
            const consult = store.activeConsultation;
            const remainingSeconds = consult.remaining_seconds;
            const remainingMinutes = Math.floor(remainingSeconds / 60); // Arredonda para baixo os minutos restantes
            const totalMinutesOriginal = consult.minutes;
            const usedMinutes = totalMinutesOriginal - remainingMinutes;

            try {
                // 1. Devolver os minutos restantes para o saldo do cliente
                if (remainingMinutes > 0) {
                    const { data: client, error: clientError } = await supabaseClient
                        .from('clients')
                        .select('balance')
                        .eq('id', consult.client_id)
                        .single();
                    
                    if (!clientError && client) {
                        const newBalance = (client.balance || 0) + remainingMinutes;
                        await supabaseClient.from('clients').update({ balance: newBalance }).eq('id', consult.client_id);
                    }
                }

                // 2. Finalizar a consulta e atualizar o tempo real utilizado (para ganhos do tarólogo)
                // Garantimos que o tempo usado seja no mínimo 0
                const finalUsedMinutes = usedMinutes > 0 ? usedMinutes : 0;
                
                await supabaseClient.from('consultas').update({ 
                    status: 'finished', 
                    remaining_seconds: 0,
                    minutes: finalUsedMinutes
                }).eq('id', consult.id);

                alert(`${msg}\n\nTempo restante (${remainingMinutes} min) devolvido ao cliente.`);
                
                // Volta status do tarólogo para ONLINE automaticamente ao finalizar
                updateUserStatus('online');
            } catch (err) {
                console.error("Erro ao finalizar consulta:", err);
                alert("Erro ao salvar finalização da consulta.");
            }
            
            store.activeConsultation = null;
            showDashboard();
        }
    </script>
