        async function initClientChat() {
            const urlParams = new URLSearchParams(window.location.search);
            const consultId = urlParams.get('c');
            
            if (!consultId) {
                alert("Consulta não encontrada.");
                window.location.href = window.location.pathname;
                return;
            }

            // Load consultation data
            const { data: consult, error } = await supabaseClient
                .from('consultas')
                .select('*, clients(*), users(*)')
                .eq('id', consultId)
                .single();

            if (error || !consult) {
                document.getElementById('client-loading').innerHTML = `<p class="text-red-500 font-bold">Erro: Atendimento não encontrado ou já finalizado.</p>`;
                return;
            }

            if (consult.status === 'finished') {
                document.getElementById('client-loading').innerHTML = `<p class="text-indigo-600 font-bold">Este atendimento já foi finalizado. Obrigado!</p>`;
                return;
            }

            document.getElementById('client-loading').classList.add('hidden');
            document.getElementById('client-chat-section').classList.remove('hidden');
            
            document.getElementById('client-tarologo-name').textContent = consult.users ? consult.users.name : 'Tarólogo';
            
            // Setup Timer
            const updateClientTimer = () => {
                const mins = Math.floor(consult.remaining_seconds / 60);
                const secs = consult.remaining_seconds % 60;
                document.getElementById('client-timer').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                
                // GERENCIAMENTO DA MENSAGEM DE ESPERA
                const waitingMsg = document.getElementById('client-waiting-msg');
                if (waitingMsg) {
                    if (consult.status === 'active') {
                        waitingMsg.remove(); // Remove do DOM para não voltar mais
                    } else {
                        waitingMsg.style.display = 'block';
                    }
                }
            };
            updateClientTimer();

            // Real-time Update for Timer and Status
            const clientConsultSub = supabaseClient
                .channel(`status_monitor_${consultId}`)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'consultas', filter: `id=eq.${consultId}` }, payload => {
                    console.log("SYNC DO BANCO (CLIENTE):", payload.new);
                    
                    const oldStatus = consult.status;
                    const newStatus = payload.new.status;
                    const dbSeconds = payload.new.remaining_seconds;
                    
                    // Notifica entrada do tarólogo se o status mudar para active
                    if (oldStatus !== 'active' && newStatus === 'active') {
                        addClientMessageToUI({
                            sender_name: 'SISTEMA',
                            text: '🌟 O tarólogo entrou na sala! Seu atendimento começou agora.',
                            created_at: new Date().toISOString()
                        }, 'system');
                    }

                    // ATUALIZAÇÃO DO CRONÔMETRO (INTELIGENTE)
                    consult.status = newStatus;
                    
                    // Só sobrescreve o tempo local se o status mudou ou se a diferença for absurda (> 30s)
                    // Isso garante que o contador local de 1 em 1s seja o soberano na tela do cliente
                    if (oldStatus !== newStatus || Math.abs(consult.remaining_seconds - dbSeconds) > 30) {
                        consult.remaining_seconds = dbSeconds;
                    }
                    
                    updateClientTimer();
                    
                    if (consult.status === 'finished') {
                        if (store.clientTimerInterval) clearInterval(store.clientTimerInterval);
                        alert("O atendimento foi encerrado. Obrigado!");
                        location.reload();
                    }
                })
                .subscribe((status) => {
                    console.log("Realtime Status Monitor (Cliente):", status);
                });

            // Cronômetro Local do Cliente (para o tempo descer de 1 em 1 segundo de forma fluida)
            if (store.clientTimerInterval) clearInterval(store.clientTimerInterval);
            store.clientTimerInterval = setInterval(() => {
                // SÓ conta se o status for 'active'
                if (consult.status === 'active' && consult.remaining_seconds > 0) {
                    consult.remaining_seconds--;
                    console.log("CONTAGEM LOCAL CLIENTE:", consult.remaining_seconds);
                    updateClientTimer();
                } else {
                    // Se não estiver ativo, garante que o timer reflita o valor atual
                    updateClientTimer();
                }
            }, 1000);

            // Chat History
            const chatBox = document.getElementById('client-messages');
            const loadClientMessages = async () => {
                const { data: consultData } = await supabaseClient.from('consultas').select('chat_log').eq('id', consultId).single();
                const messages = consultData ? (consultData.chat_log || []) : [];
                
                chatBox.innerHTML = '';
                
                // Reaplica a mensagem de espera se necessário
                const waitingMsg = document.createElement('div');
                waitingMsg.id = 'client-waiting-msg';
                waitingMsg.className = 'bg-indigo-50 border border-indigo-200 p-6 rounded-xl text-indigo-800 text-center shadow-sm';
                waitingMsg.innerHTML = `
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                        <i class="fas fa-magic text-indigo-600 text-xl animate-pulse"></i>
                    </div>
                    <h6 class="font-bold text-lg mb-2">Quase lá!</h6>
                    <p class="text-sm opacity-80 leading-relaxed">
                        O tarólogo foi notificado e já está acessando a sala.<br>
                        <span class="font-bold">Seu tempo só começará a contar quando o atendimento iniciar.</span>
                    </p>
                `;
                chatBox.appendChild(waitingMsg);
                
                messages.forEach(msg => addClientMessageToUI(msg, consult.client_id));
                updateClientTimer();
            };
            await loadClientMessages();

            // Real-time Chat (Sync with chat_log)
            const clientChatSub = supabaseClient
                .channel(`chat_messages_${consultId}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'consultas', 
                    filter: `id=eq.${consultId}` 
                }, payload => {
                    const newLog = payload.new.chat_log || [];
                    const oldLog = consult.chat_log || [];
                    if (newLog.length > oldLog.length) {
                        const newMessage = newLog[newLog.length - 1];
                        // Só mostra se for do tarólogo (evita duplicar o que eu acabei de enviar)
                        if (newMessage.sender_id !== consult.client_id) {
                            addClientMessageToUI(newMessage, consult.client_id);
                            consult.chat_log = newLog;
                        }
                    }
                })
                 .subscribe();
 
             // Finish Button for Client
             document.getElementById('client-finish-btn').onclick = async () => {
                 if (confirm('Deseja realmente encerrar a consulta agora?')) {
                     // Lógica de finalização (igual à do tarólogo para devolver minutos)
                     const remainingSeconds = consult.remaining_seconds;
                     const remainingMinutes = Math.floor(remainingSeconds / 60);
                     const usedMinutes = consult.minutes - remainingMinutes;

                     try {
                         if (remainingMinutes > 0) {
                             const { data: cData } = await supabaseClient.from('clients').select('balance').eq('id', consult.client_id).single();
                             if (cData) {
                                 await supabaseClient.from('clients').update({ balance: cData.balance + remainingMinutes }).eq('id', consult.client_id);
                             }
                         }
                         await supabaseClient.from('consultas').update({ 
                             status: 'finished', 
                             remaining_seconds: 0,
                             minutes: usedMinutes > 0 ? usedMinutes : 0,
                             ended_at: new Date().toISOString()
                         }).eq('id', consultId);
                         
                         alert("Consulta finalizada com sucesso.");
                         location.reload();
                     } catch (err) {
                         console.error(err);
                         alert("Erro ao finalizar: " + err.message);
                     }
                 }
             };
 
             // Send Message (Client)
            document.getElementById('client-chat-form').onsubmit = async (e) => {
                e.preventDefault();
                const input = document.getElementById('client-chat-input');
                const text = input.value.trim();
                if (!text) return;
                
                const clientName = (consult.clients && consult.clients.name) ? consult.clients.name : 'Cliente';
                const message = {
                    sender_id: consult.client_id,
                    sender_name: clientName,
                    text: text,
                    created_at: new Date().toISOString()
                };

                // Atualiza localmente e no banco
                consult.chat_log = consult.chat_log || [];
                consult.chat_log.push(message);
                addClientMessageToUI(message, consult.client_id);
                
                input.value = '';
                
                try {
                    await supabaseClient.from('consultas').update({ chat_log: consult.chat_log }).eq('id', consultId);
                } catch (err) {
                    console.error("Erro ao enviar mensagem do cliente:", err);
                }
            };
        }

        function addClientMessageToUI(msg, clientId) {
            const chatBox = document.getElementById('client-messages');
            
            if (clientId === 'system') {
                const sysDiv = document.createElement('div');
                sysDiv.className = 'w-full flex justify-center my-4';
                sysDiv.innerHTML = `<div class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full text-xs font-bold border border-indigo-100 shadow-sm">${msg.text}</div>`;
                chatBox.appendChild(sysDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
                return;
            }

            const isMe = msg.sender_id === clientId;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            msgDiv.innerHTML = `
                <div class="max-w-[85%] ${isMe ? 'bg-indigo-600 text-white rounded-l-xl rounded-tr-xl' : 'bg-white text-gray-800 border border-gray-100 rounded-r-xl rounded-tl-xl'} p-3 shadow-sm">
                    <p class="text-[9px] ${isMe ? 'text-indigo-200' : 'text-gray-400'} font-bold uppercase mb-1">${msg.sender_name}</p>
                    <p class="text-sm leading-relaxed">${msg.text}</p>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Tarólogo logic
        function initTarologoConsultas() {
            // Update Status Card in this view
            const currentStatus = store.currentUser.status || 'online';
            updateStatusUI(currentStatus);
            
            // Força atualização dos ganhos e metas ao abrir a visão de consultas
            updateEarningsDisplay();

            const tablePending = document.getElementById('tarologo-assigned-consultations');

            const activeSection = document.getElementById('active-consultations-section');

            const myConsults = store.consultations.filter(c => c.tarologo_id === store.currentUser.id);
            const pendingConsults = myConsults.filter(c => c.status === 'pending');
            const activeConsults = myConsults.filter(c => c.status === 'active' || c.status === 'paused');

            // 1. Renderizar Consultas Pendentes (Novas)
            tablePending.innerHTML = pendingConsults.map(c => {
                const client = store.clients.find(cl => cl.id === c.client_id);
                const typeIcon = c.type === 'phone' ? '📞 Telefone' : '💬 Chat';
                
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 font-bold text-gray-700">${client ? client.name : 'N/A'}</td>
                        <td class="px-6 py-4 font-mono">
                            <span class="bg-gray-100 px-2 py-1 rounded text-gray-600">${c.minutes}:00</span>

                        <td class="px-6 py-4 text-center flex gap-2 justify-center">
                            <button onclick="copyClientLink('${c.id}')" class="bg-gray-100 hover:bg-gray-200 text-indigo-600 p-2 rounded-lg transition" title="Copiar Link do Cliente"><i class="fas fa-link"></i></button>
                            <button onclick="startConsultationDirectly('${c.id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold transition text-xs flex items-center gap-2 shadow-sm">
                                <i class="fas fa-play"></i> INICIAR
                            </button>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="4" class="p-8 text-center text-gray-400 italic text-sm">Nenhuma nova consulta no momento.</td></tr>';

            // 2. Renderizar Consultas Ativas (Em Andamento)
            if (activeConsults.length > 0) {
                activeSection.classList.remove('hidden');
                tableActive.innerHTML = activeConsults.map(c => {
                    const client = store.clients.find(cl => cl.id === c.client_id);
                    const comissao = (c.minutes || 0) * 0.50; // R$ 0,50 por minuto
                    const iniciadoEm = new Date(c.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    const mins = Math.floor(c.remaining_seconds / 60);
                    const secs = c.remaining_seconds % 60;
                    const timerStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;

                    const isPaused = c.status === 'paused';

                    return `
                        <tr class="hover:bg-blue-50/50 ${isPaused ? 'opacity-70 grayscale-[0.5]' : ''}">
                            <td class="px-4 py-3 font-mono text-gray-400">#${c.id.substring(0,6)}</td>
                            <td class="px-4 py-3 font-black text-gray-800 uppercase">${client ? client.name : 'N/A'}</td>
                            <td class="px-4 py-3 text-gray-500">HÁ ${iniciadoEm}</td>
                            <td class="px-4 py-3 font-bold">${c.minutes} MINUTO(S)</td>
                            <td class="px-4 py-3 text-gray-400">R$ 0,00</td>
                            <td class="px-4 py-3">
                                <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-bold text-[9px]">PROMOCIONAL</span>
                            </td>
                            <td class="px-4 py-3 font-bold text-blue-600">
                                ${c.minutes}<br>
                                <span class="font-mono text-gray-400">${timerStr}</span>
                            </td>
                            <td class="px-4 py-3">
                                <div class="bg-blue-600 text-white px-2 py-1 rounded text-center">
                                    <p class="font-bold">R$ ${comissao.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                    <p class="text-[8px] uppercase opacity-80">Minutos</p>
                                </div>
                            </td>
                            <td class="px-4 py-3">
                                <div class="flex items-center justify-center gap-2">
                                    <div class="text-lg font-mono font-black ${isPaused ? 'text-orange-600 animate-pulse' : 'text-gray-800'} mr-2">${timerStr}</div>
                                    ${isPaused ? `
                                        <button onclick="resumeConsultationInTable('${c.id}')" class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center hover:bg-green-200 shadow-sm transition" title="Retomar">
                                            <i class="fas fa-play"></i>
                                        </button>
                                    ` : `
                                        <button onclick="pauseConsultationInTable('${c.id}')" class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200 shadow-sm transition" title="Pausar">
                                            <i class="fas fa-pause"></i>
                                        </button>
                                    `}
                                    <button onclick="finishConsultationInTable('${c.id}')" class="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-200 shadow-sm transition" title="Finalizar">
                                        <i class="fas fa-stop"></i>
                                    </button>
                                    ${c.type === 'chat' ? `
                                        <button onclick="startConsultation('${c.id}')" class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center hover:bg-indigo-700 shadow-sm transition" title="Abrir Chat">
                                            <i class="fas fa-comments"></i>
                                        </button>
                                    ` : ''}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

                // Iniciar cronômetro global se não estiver rodando
                startGlobalTimer();
            } else {
                activeSection.classList.add('hidden');
                stopGlobalTimer();
            }

            // 3. Renderizar Últimas Consultas Realizadas
            const tableFinished = document.getElementById('tarologo-finished-consultations-table');
            if (tableFinished) {
                const finishedConsults = myConsults
                    .filter(c => c.status === 'finished')
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at)) // Mais recentes primeiro
                    .slice(0, 5); // Mostrar apenas as últimas 5

                tableFinished.innerHTML = finishedConsults.map(c => {
                    const client = store.clients.find(cl => cl.id === c.client_id);
                    
                    // Cálculo original: Diferença entre fim e início
                    let duracaoCalculada = c.minutes || 0;
                    if (c.ended_at) {
                        const start = new Date(c.created_at);
                        const end = new Date(c.ended_at);
                        duracaoCalculada = Math.max(0, Math.round((end - start) / (1000 * 60)));
                    }
                    const comissao = duracaoCalculada * 0.50;

                    const iniciadaEm = new Date(c.created_at).toLocaleString('pt-BR', { 
                        day: '2-digit', 
                        month: '2-digit', 
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });

                    return `

                            <td class="px-4 py-3 border-r text-center font-bold text-gray-600">${duracaoCalculada} MINUTO(S)</td>
                            <td class="px-4 py-3 text-center font-bold text-blue-600">R$ ${comissao.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                        </tr>
                    `;
                }).join('') || '<tr><td colspan="5" class="p-4 text-center text-gray-400 italic">Nenhum atendimento finalizado recentemente.</td></tr>';
            }
        }

        // Funções de Controle Direto na Tabela
        async function startConsultationDirectly(id) {
            const consult = store.consultations.find(c => c.id === id);
            if (!consult) return;

            try {
                // Removemos qualquer coluna extra para evitar erros de cache do Supabase
                const { error } = await supabaseClient.from('consultas').update({ 
                    status: 'active'
                }).eq('id', id);
                
                if (error) throw error;

                consult.status = 'active';
                await updateUserStatus('busy');
                
                // Se for chat, abre a tela de chat. Se for telefone, fica na lista.
                if (consult.type === 'chat') {
                    startConsultation(id);
                } else {
                    renderView('tarologo-consultas');
                }
            } catch (err) {
                console.error("Erro ao iniciar consulta direta:", err);
                alert("Erro ao iniciar atendimento: " + (err.message || "Erro de banco de dados"));
            }
        }

        async function pauseConsultationInTable(id) {
            try {
                const { error } = await supabaseClient.from('consultas')
                    .update({ status: 'paused' })
                    .eq('id', id);
                
                if (error) throw error;
                
                // Update local state immediately
                const consult = store.consultations.find(c => c.id === id);
                if (consult) consult.status = 'paused';
                
                renderView('tarologo-consultas');
            } catch (err) {
                console.error("Erro ao pausar consulta:", err);
                alert("Erro ao pausar atendimento: " + (err.message || "Erro desconhecido"));
            }
        }

        async function resumeConsultationInTable(id) {
            try {
                const { error } = await supabaseClient.from('consultas')
                    .update({ status: 'active' })
                    .eq('id', id);
                
                if (error) throw error;
                
                // Update local state immediately
                const consult = store.consultations.find(c => c.id === id);
                if (consult) consult.status = 'active';
                
                renderView('tarologo-consultas');
            } catch (err) {
                console.error("Erro ao retomar consulta:", err);
                alert("Erro ao retomar atendimento: " + (err.message || "Erro desconhecido"));
            }
        }

        async function finishConsultationInTable(id) {
            if(confirm('Tem certeza que deseja encerrar este atendimento agora?')) {
                const consult = store.consultations.find(c => c.id === id);
                store.activeConsultation = consult; // Define como ativa para a função finish funcionar
                await finishConsultation('Atendimento finalizado pelo tarólogo via painel.');
                renderView('tarologo-consultas');
            }
        }

        let globalTimerInterval = null;
        function startGlobalTimer() {
            if (globalTimerInterval) return;
            globalTimerInterval = setInterval(async () => {
                const myConsults = store.consultations.filter(c => c.tarologo_id === store.currentUser.id);
                const activeConsults = myConsults.filter(c => c.status === 'active');
                const pausedConsults = myConsults.filter(c => c.status === 'paused');
                
                if (activeConsults.length === 0 && pausedConsults.length === 0) {
                    stopGlobalTimer();
                    return;
                }

                // Apenas processa o tempo para as que estão 'active'
                for (const consult of activeConsults) {
                    if (consult.remaining_seconds > 0) {
                        consult.remaining_seconds--;
                        
                        // Sincroniza a cada 2 segundos
                        if (consult.remaining_seconds % 2 === 0) {
                             await supabaseClient.from('consultas').update({ remaining_seconds: consult.remaining_seconds }).eq('id', consult.id);
                        }
                    } else {
                        store.activeConsultation = consult;
                        await finishConsultation('Tempo esgotado!');
                        renderView('tarologo-consultas');
                    }
                }
                
                // Atualiza a UI se estiver na tela de lista
                if (store.currentView === 'tarologo-consultas') {
                    const tableActive = document.getElementById('tarologo-active-consultations-table');
                    if (tableActive) {
                        // Só atualiza os elementos de texto do timer para evitar re-renderizar tudo
                        activeConsults.forEach(c => {
                            const mins = Math.floor(c.remaining_seconds / 60);
                            const secs = c.remaining_seconds % 60;
                            const timerStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                            // Aqui poderíamos buscar elementos específicos, mas por simplicidade re-renderizamos a linha ou a tabela
                        });
                        initTarologoConsultas(); // Re-renderiza para manter simples por enquanto
                    }
                }
            }, 1000);
        }

        function stopGlobalTimer() {
            if (globalTimerInterval) {
                clearInterval(globalTimerInterval);
                globalTimerInterval = null;
            }
        }

        function startConsultation(id) {
            const consult = store.consultations.find(c => c.id === id);
            store.activeConsultation = consult;
            
            // Switch navigation highlighting
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active', 'bg-indigo-800');
                if(l.getAttribute('data-view') === 'tarologo-chat') l.classList.add('active', 'bg-indigo-800');
            });

            renderView('tarologo-chat');
        }

        async function initTarologoChat() {
            if (!store.activeConsultation) {
                document.getElementById('no-active-consult').classList.remove('hidden');
                document.getElementById('active-consultation-section').classList.add('hidden');
                return;
            }

            const consult = store.activeConsultation;
            const client = store.clients.find(cl => cl.id === consult.client_id);
            consult.chat_log = consult.chat_log || []; // Garante que o log de chat exista
            
            document.getElementById('no-active-consult').classList.add('hidden');
            document.getElementById('active-consultation-section').classList.remove('hidden');
            
            document.getElementById('active-client-name').textContent = client.name;
            document.getElementById('active-consult-info').textContent = `Tempo total contratado: ${consult.minutes} min`;
            document.getElementById('active-consult-type').textContent = consult.type === 'phone' ? '📞 Telefone' : '💬 Chat';
            
            const pauseBtn = document.getElementById('pause-consult-btn');
            const updatePauseButtonUI = () => {
                if (consult.status === 'paused') {
                    pauseBtn.innerHTML = '<i class="fas fa-play"></i> Retomar Atendimento';
                    pauseBtn.classList.remove('bg-gray-50', 'text-gray-600');
                    pauseBtn.classList.add('bg-green-100', 'text-green-700', 'border-green-200');
                } else {
                    pauseBtn.innerHTML = '<i class="fas fa-pause"></i> Pausar Atendimento';
                    pauseBtn.classList.add('bg-gray-50', 'text-gray-600');
                    pauseBtn.classList.remove('bg-green-100', 'text-green-700', 'border-green-200');
                }
            };

            // MOSTRAR OVERLAY DE INÍCIO SE AINDA NÃO COMEÇOU
            const overlay = document.getElementById('start-consult-overlay');
            if (consult.status === 'pending') {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }

            updateTimerDisplay();
            loadMessages(consult.id);
            updatePauseButtonUI();

            const messageSubscription = supabaseClient
                .channel(`chat_messages_${consult.id}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'consultas', 
                    filter: `id=eq.${consult.id}` 
                }, payload => {
                    const newLog = payload.new.chat_log;
                    const oldLog = consult.chat_log || [];
                    if (newLog.length > oldLog.length) {
                        const newMessage = newLog[newLog.length - 1];
                        // Evita mostrar a própria mensagem duas vezes
                        if (newMessage.sender_id !== store.currentUser.id) {
                            addMessageToUI(newMessage);
                            consult.chat_log = newLog;
                        }
                    }
                })
                .subscribe((status) => {
                    console.log("Realtime Chat Status (Tarólogo):", status);
                });

            const statusSubscription = supabaseClient
                .channel(`status_monitor_${consult.id}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'consultas', 
                    filter: `id=eq.${consult.id}` 
                }, payload => {
                    console.log("CONSULTA ATUALIZADA (STATUS):", payload.new.status);
                    
                    // Sincroniza status local para pausar/retomar cronômetro
                    consult.status = payload.new.status;
                    
                    // Atualiza botão de pausa no chat se estiver visível
                    if (typeof updatePauseButtonUI === 'function') updatePauseButtonUI();
                    
                    if (payload.new.status === 'finished' && store.activeConsultation) {
                        finishConsultation('O cliente encerrou o atendimento ou o tempo acabou.');
                    }
                })
                .subscribe((status) => {
                    console.log("Realtime Status Monitor (Tarólogo):", status);
                });

            if (store.timerInterval) clearInterval(store.timerInterval);
            store.timerInterval = setInterval(async () => {
                // O cronômetro do tarólogo SÓ corre se o status for 'active'
                if (consult.status === 'active') {
                    if (consult.remaining_seconds > 0) {
                        consult.remaining_seconds--;
                        updateTimerDisplay();
                        
                        // Sincroniza com o Banco de Dados a cada 2 segundos para o cliente ver com precisão
                        if (consult.remaining_seconds % 2 === 0) {
                             await supabaseClient.from('consultas').update({ remaining_seconds: consult.remaining_seconds }).eq('id', consult.id);
                        }
                        
                        if (consult.remaining_seconds === 60) {
                            alert('⚠️ AVISO: Falta apenas 1 minuto para encerrar a consulta!');
                        }
                    } else {
                        finishConsultation('Tempo esgotado! A consulta foi encerrada automaticamente.');
                    }
                }
            }, 1000);

            document.getElementById('chat-form').onsubmit = async (e) => {
                e.preventDefault();
                const input = document.getElementById('chat-input');
                const text = input.value.trim();
                if (!text) return;

                const message = {
                    sender_id: store.currentUser.id,
                    sender_name: store.currentUser.name,
                    text: text,
                    created_at: new Date().toISOString()
                };

                // Adiciona a mensagem ao log local e envia para o Supabase
                consult.chat_log.push(message);
                addMessageToUI(message);
                
                input.value = '';
                await supabaseClient.from('consultas').update({ chat_log: consult.chat_log }).eq('id', consult.id);
            };

            document.getElementById('finish-consult-btn').onclick = () => {
                if(confirm('Tem certeza que deseja encerrar este atendimento agora?')) {
                    supabaseClient.removeChannel(messageSubscription);
                    supabaseClient.removeChannel(statusSubscription);
                    finishConsultation('Atendimento finalizado pelo tarólogo.');
                }
            };
            
            pauseBtn.onclick = async () => { 
                const newStatus = consult.status === 'paused' ? 'active' : 'paused';
                
                try {
                    const { error } = await supabaseClient.from('consultas')
                        .update({ status: newStatus })
                        .eq('id', consult.id);
                    
                    if (error) throw error;
                    
                    consult.status = newStatus;
                    updatePauseButtonUI();
                    
                    // Se for chat, o monitor de status (Realtime) já deve cuidar do resto,
                    // mas atualizamos localmente para resposta instantânea.
                    console.log(`Atendimento ${newStatus === 'paused' ? 'pausado' : 'retomado'} via chat.`);
                } catch (err) {
                    console.error("Erro ao alterar status da consulta:", err);
                }
            };
        }

        async function activateConsultationManual() {
            if (!store.activeConsultation) return;
            const consult = store.activeConsultation;
            
            try {
                // Muda o status local e no banco
                consult.status = 'active';
                await supabaseClient.from('consultas').update({ status: 'active' }).eq('id', consult.id);
                
                // Muda status do tarólogo para OCUPADO
                updateUserStatus('busy');
                
                // Esconde o overlay
                const overlay = document.getElementById('start-consult-overlay');
                if (overlay) overlay.classList.add('hidden');
                
                console.log("Consulta iniciada manualmente pelo tarólogo!");
            } catch (err) {
                console.error("Erro ao ativar consulta:", err);
                alert("Erro ao iniciar o atendimento. Tente novamente.");
            }
        }

        async function loadMessages(consultationId) {
            const chatBox = document.getElementById('chat-messages');
            const consult = store.consultations.find(c => c.id === consultationId);
            const messages = consult ? (consult.chat_log || []) : [];

            chatBox.innerHTML = messages.length ? '' : '<div class="text-center text-xs text-gray-400 italic my-4">Nenhuma mensagem ainda.</div>';
            messages.forEach(msg => addMessageToUI(msg));
        }

        function addMessageToUI(msg) {
            const chatBox = document.getElementById('chat-messages');
            const isMe = msg.sender_id === store.currentUser.id;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            msgDiv.innerHTML = `
                <div class="max-w-[80%] ${isMe ? 'bg-blue-600 text-white rounded-l-lg rounded-tr-lg' : 'bg-white text-gray-800 border border-gray-200 rounded-r-lg rounded-tl-lg'} p-3 shadow-sm">
                    <p class="text-[10px] ${isMe ? 'text-blue-100' : 'text-gray-400'} font-bold uppercase mb-1">${msg.sender_name}</p>
                    <p class="text-sm">${msg.text}</p>
                    <p class="text-[9px] ${isMe ? 'text-blue-200' : 'text-gray-400'} text-right mt-1">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateTimerDisplay() {
            const mins = Math.floor(store.activeConsultation.remaining_seconds / 60);
            const secs = store.activeConsultation.remaining_seconds % 60;
            const timeStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            
            const mainEl = document.getElementById('consultation-timer');
            const miniEl = document.getElementById('mini-timer');
            
            if (mainEl) mainEl.textContent = timeStr;
            if (miniEl) miniEl.textContent = timeStr;
        }

        async function finishConsultation(msg) {
            clearInterval(store.timerInterval);
            
            const consult = store.activeConsultation;
            if (!consult) return;

            const remainingSeconds = consult.remaining_seconds;
            const remainingMinutes = Math.floor(remainingSeconds / 60); 
            const totalMinutesOriginal = consult.minutes;
            const usedMinutes = totalMinutesOriginal - remainingMinutes;

            try {
                // 1. Devolver os minutos restantes para o saldo do cliente
                if (remainingMinutes > 0) {
                    const { data: client, error: clientError } = await supabaseClient
                        .from('clients')
                        .select('balance')
                        .eq('id', consult.client_id)
                        .single();
                    
                    if (!clientError && client) {
                        const newBalance = (client.balance || 0) + remainingMinutes;
                        await supabaseClient.from('clients').update({ balance: newBalance }).eq('id', consult.client_id);
                    }
                }

                // 2. Finalizar a consulta no Banco de Dados
                const finalUsedMinutes = usedMinutes > 0 ? usedMinutes : 0;
                
                const { error } = await supabaseClient.from('consultas').update({ 
                    status: 'finished', 
                    remaining_seconds: 0,
                    minutes: finalUsedMinutes,
                    ended_at: new Date().toISOString()
                }).eq('id', consult.id);

                if (error) throw error;

                if (msg) alert(`${msg}\n\nTempo restante (${remainingMinutes} min) devolvido ao cliente.`);
                
                // Volta status do tarólogo para ONLINE automaticamente ao finalizar
                updateUserStatus('online');
            } catch (err) {
                console.error("Erro ao finalizar consulta:", err);
                if (msg) alert("Erro ao salvar finalização da consulta: " + err.message);
            }
            
            store.activeConsultation = null;
            showDashboard();
        }
    </script>
</body>
