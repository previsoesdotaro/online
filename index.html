<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Tarot - Previsões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .sidebar { transition: all 0.3s; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        @keyframes pulse-status {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .status-pulse { animation: pulse-status 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-800">
            <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-indigo-900">Portal Tarot</h1>
                    <p class="text-gray-500">Acesse seu painel de atendimento</p>
                </div>
                <form id="login-form">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                        <input type="text" id="username" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Digite seu usuário" required>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                        <input type="password" id="password" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-md transition duration-200">
                        Entrar
                    </button>
                </form>
            </div>
        </div>

        <!-- Main Dashboard (Hidden by default) -->
        <div id="main-dashboard" class="hidden min-h-screen flex">
            <!-- Sidebar -->
            <div class="sidebar w-64 bg-indigo-900 text-white flex-shrink-0">
                <div class="p-6 text-center border-b border-indigo-800">
                    <h2 class="text-2xl font-bold">Painel de Tarot</h2>
                    <p id="user-role-display" class="text-xs text-indigo-300 mt-1 uppercase tracking-wider font-semibold"></p>
                    
                    <!-- Tarólogo Status Selector -->
                    <div id="status-selector-container" class="mt-4 hidden">
                        <div class="flex flex-col items-center gap-2">
                            <div class="flex items-center gap-2 px-3 py-1.5 bg-indigo-950 rounded-full border border-indigo-700 w-full justify-between group cursor-pointer relative" onclick="toggleStatusDropdown()">
                                <div class="flex items-center gap-2">
                                     <span id="user-status-indicator" class="w-3 h-3 rounded-full bg-gray-500"></span>
                                     <span id="user-status-text" class="text-[10px] font-bold uppercase">Offline</span>
                                 </div>
                                <i class="fas fa-chevron-down text-[10px] text-indigo-400 group-hover:text-white transition"></i>
                                
                                <!-- Dropdown -->
                                <div id="status-dropdown" class="absolute top-full left-0 right-0 mt-1 bg-indigo-900 border border-indigo-700 rounded-lg shadow-xl hidden z-50 overflow-hidden">
                                    <button onclick="updateUserStatus('online')" class="w-full px-4 py-2 text-left text-[10px] font-bold uppercase hover:bg-indigo-800 flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-green-500"></span> Online
                                    </button>
                                    <button onclick="updateUserStatus('busy')" class="w-full px-4 py-2 text-left text-[10px] font-bold uppercase hover:bg-indigo-800 flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-red-500"></span> Ocupado
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <nav class="mt-6">
                    <div id="admin-nav" class="hidden">
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3 active" data-view="admin-dashboard">
                            <i class="fas fa-chart-line"></i> Painel Principal
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="admin-clients">
                            <i class="fas fa-users"></i> Clientes
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="admin-tarologos">
                            <i class="fas fa-user-tie"></i> Tarólogos
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="admin-history">
                            <i class="fas fa-history"></i> Histórico
                        </a>
                    </div>
                    <div id="tarologo-nav" class="hidden">
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3 active" data-view="tarologo-consultas">
                            <i class="fas fa-list"></i> Minha Lista
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="tarologo-chat">
                            <i class="fas fa-comments"></i> Chat de Atendimento
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="tarologo-history">
                            <i class="fas fa-history"></i> Meu Histórico
                        </a>
                    </div>
                    <div class="px-6 py-4 mt-6 border-t border-indigo-800">
                        <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1">Meus Ganhos (Mês)</p>
                        <p id="sidebar-earnings" class="text-xl font-bold text-green-400">R$ 0,00</p>
                    </div>
                    <a href="#" id="logout-btn" class="block py-3 px-6 hover:bg-red-800 text-red-300 mt-4 flex items-center gap-3">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </a>
                </nav>
            </div>

            <!-- Content Area -->
            <div class="flex-1 flex flex-col">
                <!-- Topbar -->
                <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
                    <h3 id="view-title" class="text-xl font-semibold text-gray-700">Dashboard</h3>
                    <div class="flex items-center gap-4">
                        <span id="current-user-name" class="font-medium">Admin</span>
                        <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                </header>

                <!-- Dynamic Content Views -->
                <main id="view-content" class="p-8 overflow-y-auto">
                    <!-- Views will be injected here -->
                </main>
            </div>
        </div>
    </div>

    <!-- Modals (Injected via JS) -->
    <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div id="modal-content" class="bg-white rounded-lg shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Template Views (Hidden) -->
    <template id="view-admin-dashboard">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-600">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Total de Clientes</p>
                <h4 class="text-3xl font-bold mt-1 text-blue-600" id="stat-total-clients">0</h4>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-600">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Consultas Hoje</p>
                <h4 class="text-3xl font-bold mt-1 text-green-600" id="stat-today-consults">0</h4>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-purple-600">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Tarólogos Ativos</p>
                <h4 class="text-3xl font-bold mt-1 text-purple-600" id="stat-online-tarologos">0</h4>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-blue-200">
            <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                <h4 class="font-bold text-lg">Consultas em Aberto</h4>
                <button onclick="openNewConsultationModal()" class="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded text-sm font-medium transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Nova Consulta
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold border-b">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">CLIENTE</th>
                            <th class="px-6 py-4">TEMPO (MIN)</th>
                            <th class="px-6 py-4">TARÓLOGO</th>
                            <th class="px-6 py-4">STATUS</th>
                            <th class="px-6 py-4">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="admin-consultations-table" class="divide-y">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="view-admin-clients">
        <div class="bg-white rounded-lg shadow-sm border border-blue-200">
            <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                <h4 class="font-bold text-lg">Gerenciamento de Clientes</h4>
                <button onclick="openNewClientModal()" class="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded text-sm font-medium transition flex items-center gap-2">
                    <i class="fas fa-user-plus"></i> Adicionar Cliente
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold border-b">
                        <tr>
                            <th class="px-6 py-4">NOME</th>
                            <th class="px-6 py-4">CPF</th>
                            <th class="px-6 py-4">CONTATO</th>
                            <th class="px-6 py-4">SALDO (MIN)</th>
                            <th class="px-6 py-4">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="admin-clients-table" class="divide-y">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="view-admin-tarologos">
        <div class="bg-white rounded-lg shadow-sm border border-blue-200">
            <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                <h4 class="font-bold text-lg">Gerenciamento de Tarólogos</h4>
                <button onclick="openNewTarologoModal()" class="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded text-sm font-medium transition">
                    Adicionar Tarólogo
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold border-b">
                            <tr>
                                <th class="px-6 py-4">NOME</th>
                                <th class="px-6 py-4">USUÁRIO</th>
                                <th class="px-6 py-4">STATUS</th>
                                <th class="px-6 py-4">AÇÕES</th>
                            </tr>
                        </thead>
                    <tbody id="admin-tarologos-table" class="divide-y">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="view-admin-history">
        <div class="bg-white rounded-lg shadow-sm border border-blue-200">
            <div class="bg-blue-600 text-white p-4 rounded-t-lg">
                <h4 class="font-bold text-lg">Histórico de Consultas (Últimos 30 dias)</h4>
            </div>
            <div class="p-4 bg-gray-50 border-b">
                <input type="text" id="history-search" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Buscar por nome do cliente ou tarólogo...">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold border-b">
                        <tr>
                            <th class="px-6 py-4">DATA</th>
                            <th class="px-6 py-4">CLIENTE</th>
                            <th class="px-6 py-4">TARÓLOGO</th>
                            <th class="px-6 py-4">DURAÇÃO</th>
                            <th class="px-6 py-4 text-center">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="admin-history-table" class="divide-y">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="view-tarologo-consultas">
        <div class="space-y-6">
            <!-- Novo Card de Status (Destaque) -->
            <div class="bg-white rounded-xl shadow-sm border border-indigo-100 p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600">
                        <i class="fas fa-user-circle text-3xl"></i>
                    </div>
                    <div>
                        <h4 class="text-lg font-bold text-gray-800">Seu Status de Atendimento</h4>
                        <div class="flex items-center gap-2 mt-1">
                            <span id="card-status-indicator" class="w-4 h-4 rounded-full bg-gray-500"></span>
                            <span id="card-status-text" class="text-sm font-bold text-gray-600 uppercase">Offline</span>
                        </div>
                    </div>
                </div>
                
                <div id="card-status-btns" class="flex flex-wrap gap-3">
                    <button onclick="updateUserStatus('online')" data-status="online" class="flex items-center gap-2 px-6 py-3 rounded-lg border border-green-200 hover:bg-green-50 transition-all font-bold text-green-700 text-sm">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span> Online
                    </button>
                    <button onclick="updateUserStatus('busy')" data-status="busy" class="flex items-center gap-2 px-6 py-3 rounded-lg border border-red-200 hover:bg-red-50 transition-all font-bold text-red-700 text-sm">
                        <span class="w-2 h-2 rounded-full bg-red-500"></span> Ocupado
                    </button>
                </div>
            </div>

            <!-- Consultas em Andamento (Novo Estilo da Foto) -->
            <div id="active-consultations-section" class="bg-white rounded-lg shadow-sm border border-blue-200 hidden">
                <div class="bg-blue-600 text-white p-3 rounded-t-lg">
                    <h4 class="font-bold text-sm uppercase tracking-wider">Consultas em andamento</h4>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-gray-50 text-gray-400 uppercase font-bold border-b">
                            <tr>
                                <th class="px-4 py-3">ID</th>
                                <th class="px-4 py-3">CLIENTE</th>
                                <th class="px-4 py-3">INICIADO</th>
                                <th class="px-4 py-3">TEMPO DE CONSULTA</th>
                                <th class="px-4 py-3">CORTESIA</th>
                                <th class="px-4 py-3">PROMOÇÃO</th>
                                <th class="px-4 py-3">MIN. PRÉ-PAGO</th>
                                <th class="px-4 py-3">COMISSÃO</th>
                                <th class="px-4 py-3 text-center">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="tarologo-active-consultations-table" class="divide-y">
                            <!-- Injetado por JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Consultas em Aberto (Aguardando Início) -->
            <div class="bg-white rounded-lg shadow-sm border border-indigo-200">
                <div class="bg-indigo-600 text-white p-3 rounded-t-lg flex justify-between items-center">
                    <h4 class="font-bold text-sm uppercase tracking-wider">Novas Consultas para você</h4>
                    <button onclick="renderView('tarologo-consultas')" class="bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded text-xs flex items-center gap-2">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold border-b">
                            <tr>
                                <th class="px-6 py-4">CLIENTE</th>
                                <th class="px-6 py-4">TEMPO (MIN)</th>
                                <th class="px-6 py-4">TIPO</th>
                                <th class="px-6 py-4 text-center">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="tarologo-assigned-consultations" class="divide-y">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Metas / Comissões Section (From Photo) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white rounded-lg shadow-sm border border-blue-200">
                    <div class="bg-blue-600 text-white p-4 rounded-t-lg">
                        <h4 class="font-bold text-lg">Vales</h4>
                    </div>
                    <div class="p-6 space-y-4">
                        <div class="flex justify-between items-center border-b pb-2">
                            <span class="text-gray-600">Total de comissões</span>
                            <span id="total-comissoes" class="font-bold text-blue-600">R$ 0,00</span>
                        </div>
                        <div class="flex justify-between items-center border-b pb-2">
                            <span class="text-gray-600">Meta</span>
                            <span class="font-bold text-green-600">R$ 4.000,00</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600 font-bold">À receber</span>
                            <span id="total-receber" class="font-bold text-red-600">R$ 0,00</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm border border-blue-200">
                    <div class="bg-blue-600 text-white p-4 rounded-t-lg">
                        <h4 class="font-bold text-lg">Metas</h4>
                    </div>
                    <div class="p-6">
                        <div class="grid grid-cols-2 gap-4 text-center">
                            <div class="bg-blue-50 p-4 rounded">
                                <p class="text-xs text-blue-600 font-bold uppercase">Mensal</p>
                                <p id="mensal-realizado" class="text-xl font-bold">R$ 0,00</p>
                                <p class="text-xs text-gray-500 mt-1">Valor Realizado</p>
                            </div>
                            <div class="bg-green-50 p-4 rounded">
                                <p class="text-xs text-green-600 font-bold uppercase">Diário</p>
                                <p class="text-xl font-bold">R$ 132,00</p>
                                <p class="text-xs text-gray-500 mt-1">Meta do Dia</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="view-tarologo-chat">
        <div id="no-active-consult" class="bg-white rounded-lg shadow-sm border border-gray-200 p-12 text-center text-gray-400 italic">
            Nenhuma consulta em andamento. Selecione uma na sua "Minha Lista" para começar.
        </div>
        
        <div id="active-consultation-section" class="hidden h-[calc(100vh-160px)] relative">
            <!-- Overlay para Iniciar Atendimento (Manual) -->
            <div id="start-consult-overlay" class="hidden absolute inset-0 z-[100] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center p-8 text-center rounded-lg border-2 border-dashed border-indigo-200 m-4 shadow-xl">
                <div class="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-6 shadow-inner animate-pulse">
                    <i class="fas fa-play text-4xl ml-2"></i>
                </div>
                <h3 class="text-3xl font-black text-indigo-900 mb-2">Pronto para começar?</h3>
                <p class="text-gray-500 mb-8 max-w-md">O cliente já está aguardando ou a ligação está pronta. O tempo só começará a contar quando você clicar no botão abaixo.</p>
                <button onclick="activateConsultationManual()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-black py-6 px-12 rounded-2xl shadow-2xl shadow-indigo-200 transition-all active:scale-95 flex items-center gap-4 group">
                    <i class="fas fa-bolt text-yellow-400 group-hover:scale-125 transition-transform"></i>
                    INICIAR ATENDIMENTO AGORA
                </button>
            </div>

            <div class="flex flex-col md:flex-row gap-6 h-full">
                <!-- Left Sidebar: Info & Control -->
                <div class="md:w-1/4 flex flex-col items-center justify-between bg-white p-6 rounded-lg border border-gray-200 shadow-sm h-full overflow-y-auto">
                    <div class="w-full">
                        <!-- Client Header -->
                        <div class="text-center mb-8 border-b pb-6">
                            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3">
                                <i class="fas fa-user text-2xl"></i>
                            </div>
                            <h5 id="active-client-name" class="text-xl font-bold text-gray-800 break-words">Maria Silva</h5>
                            <p class="text-xs text-gray-400 mt-1 uppercase tracking-tighter">Em atendimento agora</p>
                        </div>
                        
                        <!-- Discrete Timer Card -->
                        <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 mb-6 shadow-sm">
                            <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1">Tempo Restante</p>
                            <div class="flex items-center justify-center gap-3">
                                <i class="fas fa-clock text-indigo-400 text-xl"></i>
                                <div id="consultation-timer" class="text-4xl font-mono font-bold text-indigo-700 tracking-tight">15:00</div>
                            </div>
                            <p id="active-consult-info" class="text-[9px] text-indigo-400 text-center mt-2 italic">Duração total: 15 min</p>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-lg text-sm text-gray-600 space-y-2">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Tipo de Atendimento</p>
                            <p id="active-consult-type" class="text-gray-700 font-bold uppercase">-</p>
                        </div>

                        <button onclick="copyClientLink(store.activeConsultation.id)" class="w-full mt-4 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold py-2 rounded-lg border border-indigo-200 text-xs flex items-center justify-center gap-2">
                            <i class="fas fa-link"></i> Copiar Link para o Cliente
                        </button>
                    </div>

                    <div class="w-full pt-6 border-t mt-auto space-y-2">

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://rtjgqfaphqkdbdzzytzw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ZxezFGN28TucGeZisbI7qQ_HcbU-CuA'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Data Store (using Supabase)
        const store = {
            clients: [],
            users: [],
            consultations: [],
            currentUser: null,
            activeConsultation: null,
            timerInterval: null,
            clientTimerInterval: null,
            currentView: 'admin-dashboard',
            notificationSubscription: null
        };

        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        // Fetch Initial Data from Supabase
        async function loadInitialData() {
            try {
                const { data: clients } = await supabaseClient.from('clients').select('*');
                const { data: users } = await supabaseClient.from('users').select('*').order('name');
                const { data: consultations } = await supabaseClient.from('consultas').select('*');
                
                store.clients = clients || [];
                store.users = users || [];
                store.consultations = consultations || [];
                
                // Refresh currentUser status from DB
                if (store.currentUser) {
                    const dbUser = store.users.find(u => u.id === store.currentUser.id);
                    if (dbUser) {
                        store.currentUser.status = dbUser.status || 'offline';
                        localStorage.setItem('tarot_user', JSON.stringify(store.currentUser));
                    }
                }

                updateEarningsDisplay();
                
                // Se o administrador estiver na aba de tarólogos, atualiza a tabela
                if (store.currentUser && store.currentUser.role === 'admin' && store.currentView === 'admin-tarologos') {
                    renderAdminTarologosTable();
                }
            } catch (err) {
                console.error("Erro ao carregar dados:", err);
            }
        }

        async function updateUserStatus(status) {
            if (!store.currentUser || store.currentUser.role !== 'tarologo') return;
            console.log(`Tentando atualizar status para: ${status}`);
            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ status: status })
                    .eq('id', store.currentUser.id);
                
                if (error) {
                    console.error("Erro Supabase ao atualizar status:", error);
                    throw error;
                }

                console.log("Status atualizado no banco com sucesso!");

                // Update local store
                store.currentUser.status = status;
                localStorage.setItem('tarot_user', JSON.stringify(store.currentUser));

                const userIdx = store.users.findIndex(u => u.id === store.currentUser.id);
                if (userIdx !== -1) store.users[userIdx].status = status;
                
                // Update UI indicators (Sidebar and Dashboard Card)
                updateStatusUI(status);

            } catch (err) {
                console.error("Erro ao atualizar status:", err);
            }
        }

        function updateStatusUI(status) {
            const colors = {
                'online': 'bg-green-500',
                'busy': 'bg-red-500',
                'offline': 'bg-gray-500'
            };
            const labels = {
                'online': 'Online',
                'busy': 'Ocupado',
                'offline': 'Offline'
            };

            // 1. Sidebar Indicator
            const sideIndicator = document.getElementById('user-status-indicator');
            const sideText = document.getElementById('user-status-text');
            if (sideIndicator) {
                sideIndicator.className = `w-3 h-3 rounded-full ${colors[status] || 'bg-gray-500'}`;
                if (status === 'online') sideIndicator.classList.add('status-pulse');
                else sideIndicator.classList.remove('status-pulse');
            }
            if (sideText) sideText.textContent = labels[status] || 'Offline';

            // 2. Dashboard Card Indicator (if present in current view)
            const cardIndicator = document.getElementById('card-status-indicator');
            const cardText = document.getElementById('card-status-text');
            const cardBtnGroup = document.getElementById('card-status-btns');

            if (cardIndicator) {
                cardIndicator.className = `w-4 h-4 rounded-full ${colors[status] || 'bg-gray-500'}`;
                if (status === 'online') cardIndicator.classList.add('status-pulse');
                else cardIndicator.classList.remove('status-pulse');
            }
            if (cardText) cardText.textContent = labels[status] || 'Offline';
            
            // Highlight active button in card
            if (cardBtnGroup) {
                cardBtnGroup.querySelectorAll('button').forEach(btn => {
                    const btnStatus = btn.getAttribute('data-status');
                    if (btnStatus === status) {
                        btn.classList.add('ring-2', 'ring-offset-2', 'ring-indigo-500', 'bg-indigo-50');
                    } else {
                        btn.classList.remove('ring-2', 'ring-offset-2', 'ring-indigo-500', 'bg-indigo-50');
                    }
                });
            }
        }

        // Handle window closing to set offline
        window.addEventListener('beforeunload', () => {
            if (store.currentUser && store.currentUser.role === 'tarologo') {
                // Use navigator.sendBeacon or a synchronous-like update if possible, 
                // but Supabase is async. Best effort here.
                updateUserStatus('offline');
            }
        });

        function updateEarningsDisplay() {
            if (!store.currentUser || store.currentUser.role !== 'tarologo') return;
            
            const myFinishedConsults = store.consultations.filter(c => 
                c.tarologo_id === store.currentUser.id && 
                c.status === 'finished'
            );
            
            // Valor total do minuto: R$ 2,00. Comissão do Tarólogo: 25% (R$ 0,50)
            const totalMinutes = myFinishedConsults.reduce((acc, c) => acc + (c.minutes || 0), 0);
            const earnings = totalMinutes * 0.50;
            
            const display = document.getElementById('sidebar-earnings');
            if (display) display.textContent = `R$ ${earnings.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            
            // Update Valleys/Metas if in that view
            const totalComissionEl = document.getElementById('total-comissoes');
            const totalReceberEl = document.getElementById('total-receber');
            const mensalRealizadoEl = document.getElementById('mensal-realizado');
            
            if (totalComissionEl) totalComissionEl.textContent = `R$ ${earnings.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            if (totalReceberEl) totalReceberEl.textContent = `R$ ${earnings.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            if (mensalRealizadoEl) mensalRealizadoEl.textContent = `R$ ${earnings.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }

        // Auth Logic
        async function checkPersistedLogin() {
            // Check if it's a client access first
            const urlParams = new URLSearchParams(window.location.search);
            const consultationId = urlParams.get('c');
            
            if (consultationId) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                // Hide sidebar for clients
                document.querySelector('.sidebar').classList.add('hidden');
                document.querySelector('header').classList.add('hidden');
                renderView('client-chat');
                return;
            }

            const savedUser = localStorage.getItem('tarot_user');
            if (savedUser) {
                store.currentUser = JSON.parse(savedUser);
                showDashboard();
            }
        }
        checkPersistedLogin();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const submitBtn = e.target.querySelector('button');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Entrando...';

            try {
                // Query case-insensitive for username but exact for password
                const { data: user, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .ilike('username', username)
                    .eq('password', password)
                    .single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        alert('Usuário ou senha incorretos! Verifique se digitou corretamente.');
                    } else {
                        console.error("Erro no Login:", error);
                        alert('Erro de conexão com o Banco: ' + error.message);
                    }
                    return;
                }

                if (user) {
                    store.currentUser = user;
                    localStorage.setItem('tarot_user', JSON.stringify(user));
                    
                    // Explicitly set to online on fresh login
                    if (user.role === 'tarologo') {
                        await updateUserStatus('online');
                    }
                    
                    showDashboard();
                }
            } catch (err) {
                alert('Erro inesperado: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            if (store.currentUser && store.currentUser.role === 'tarologo') {
                await updateUserStatus('offline');
            }
            store.currentUser = null;
            localStorage.removeItem('tarot_user');
            if (store.timerInterval) clearInterval(store.timerInterval);
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        });

        async function showDashboard() {
            await loadInitialData();
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('current-user-name').textContent = store.currentUser.name;
            
            // Map role to Portuguese
            const roleMap = {
                'admin': 'Administrador',
                'tarologo': 'Tarólogo'
            };
            document.getElementById('user-role-display').textContent = roleMap[store.currentUser.role] || store.currentUser.role;

            // Start Realtime Monitors
            if (store.currentUser.role === 'admin') {
                startAdminStatusMonitor(); // NEW: Monitor statuses globally for Admin
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('tarologo-nav').classList.add('hidden');
                document.getElementById('status-selector-container').classList.add('hidden');
                renderView('admin-dashboard');
            } else {
                startNotificationMonitor(); // Tarólogo needs notification monitor
                document.getElementById('admin-nav').classList.add('hidden');
                document.getElementById('tarologo-nav').classList.remove('hidden');
                document.getElementById('status-selector-container').classList.remove('hidden');
                
                // Set initial UI status from store
                const myStatus = store.currentUser.status || 'online';
                updateUserStatus(myStatus);
                
                renderView('tarologo-consultas');
            }
        }

        function startAdminStatusMonitor() {
            if (store.statusSubscription) supabaseClient.removeChannel(store.statusSubscription);
            
            console.log("Iniciando monitor de status global para o Administrador...");
            
            store.statusSubscription = supabaseClient
                .channel('admin_global_status')
                // 1. Monitora status dos usuários (online/offline/ocupado)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'users'
                }, payload => {
                    console.log("STATUS UPDATE RECEIVED (GLOBAL ADMIN):", payload.new);
                    
                    const userIdx = store.users.findIndex(u => u.id === payload.new.id);
                    if (userIdx !== -1) {
                        store.users[userIdx] = payload.new;
                        
                        if (store.currentView === 'admin-dashboard') {
                            const activeCount = store.users.filter(u => u.role === 'tarologo' && u.status === 'online').length;
                            const statEl = document.getElementById('stat-online-tarologos');
                            if (statEl) statEl.textContent = activeCount;
                            
                            // Também re-renderiza a tabela para atualizar nomes/status se necessário
                            initAdminDashboard();
                        } else if (store.currentView === 'admin-tarologos') {
                            renderAdminTarologosTable();
                        }
                    }
                })
                // 2. Monitora status das consultas (Aguardando -> Em Atendimento)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'consultas'
                }, payload => {
                    console.log("CONSULTA UPDATE RECEIVED (GLOBAL ADMIN):", payload.new);
                    
                    const consultIdx = store.consultations.findIndex(c => c.id === payload.new.id);
                    if (consultIdx !== -1) {
                        store.consultations[consultIdx] = payload.new;
                    } else {
                        store.consultations.push(payload.new);
                    }

                    if (store.currentView === 'admin-dashboard') {
                        initAdminDashboard();
                    }
                })
                // 3. Monitora NOVAS consultas
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'consultas'
                }, payload => {
                    console.log("NOVA CONSULTA RECEBIDA (GLOBAL ADMIN):", payload.new);
                    store.consultations.push(payload.new);
                    if (store.currentView === 'admin-dashboard') {
                        initAdminDashboard();
                    }
                })
                .subscribe();
        }

        function toggleStatusDropdown() {
            const dropdown = document.getElementById('status-dropdown');
            dropdown.classList.toggle('hidden');
            
            // Close dropdown when clicking outside
            const closeDropdown = (e) => {
                if (!e.target.closest('#status-selector-container')) {
                    dropdown.classList.add('hidden');
                    document.removeEventListener('click', closeDropdown);
                }
            };
            if (!dropdown.classList.contains('hidden')) {
                setTimeout(() => document.addEventListener('click', closeDropdown), 10);
            }
        }

        function startNotificationMonitor() {
            if (!store.currentUser) return;
            if (store.notificationSubscription) supabaseClient.removeChannel(store.notificationSubscription);
            
            console.log("Iniciando monitor de notificações para o tarólogo:", store.currentUser.id);

            // Monitor for NEW consultations assigned to THIS tarologist
            store.notificationSubscription = supabaseClient
                .channel('new_consultations_channel')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'consultas',
                    filter: `tarologo_id=eq.${store.currentUser.id}`
                }, async (payload) => {
                    console.log("NOVA CONSULTA RECEBIDA EM TEMPO REAL:", payload);
                    
                    if (payload.new.status === 'pending') {
                        // Tentar tocar som
                        notificationSound.currentTime = 0;
                        notificationSound.play().then(() => {
                            console.log("Som de notificação tocado!");
                        }).catch(e => {
                            console.warn("Som bloqueado pelo navegador. Clique na página uma vez para autorizar sons.", e);
                        });
                        
                        // Notificação do navegador
                        if (Notification.permission === "granted") {
                            new Notification("Nova Consulta!", { 
                                body: "Você recebeu um atendimento de " + (payload.new.type === 'phone' ? 'Telefone' : 'Chat'),
                                icon: 'https://cdn-icons-png.flaticon.com/512/107/107831.png'
                            });
                        }

                        // Atualizar dados e interface
                        await loadInitialData();
                        if (store.currentView === 'tarologo-consultas') {
                            renderView('tarologo-consultas');
                        }
                    }
                })
                .subscribe((status) => {
                    console.log("Status da conexão Realtime:", status);
                });
            
            // Ask for notification permission
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        // Navigation
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const view = link.getAttribute('data-view');
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active', 'bg-indigo-800'));
                link.classList.add('active', 'bg-indigo-800');
                renderView(view);
            });
        });

        async function renderView(viewId) {
            store.currentView = viewId;
            const template = document.getElementById(`view-${viewId}`);
            const content = document.getElementById('view-content');
            const viewTitle = document.getElementById('view-title');
            
            content.innerHTML = '';
            content.appendChild(template.content.cloneNode(true));

            const titles = {
                'admin-dashboard': 'Resumo do Sistema',
                'admin-clients': 'Gerenciar Clientes',
                'admin-tarologos': 'Gerenciar Tarólogos',
                'admin-history': 'Histórico de Consultas',
                'tarologo-consultas': 'Minha Lista de Consultas',
                'tarologo-chat': 'Sala de Atendimento',
                'tarologo-history': 'Meu Histórico',
                'client-chat': 'Seu Atendimento'
            };
            viewTitle.textContent = titles[viewId] || 'Dashboard';

            if (viewId === 'admin-dashboard') initAdminDashboard();
            if (viewId === 'admin-clients') initAdminClients();
            if (viewId === 'admin-tarologos') initAdminTarologos();
            if (viewId === 'admin-history') initAdminHistory();
            if (viewId === 'tarologo-consultas') initTarologoConsultas();
            if (viewId === 'tarologo-chat') initTarologoChat();
            if (viewId === 'tarologo-history') initTarologoHistory();
            if (viewId === 'client-chat') initClientChat();
        }

        async function initAdminHistory() {
            const tableBody = document.getElementById('admin-history-table');
            tableBody.innerHTML = '<tr><td colspan="5" class="text-center p-8"><i class="fas fa-spinner fa-spin text-2xl text-indigo-600"></i></td></tr>';

            const { data: consultations, error } = await supabaseClient
                .from('consultas')
                .select(`
                    id, created_at, ended_at, client_name,
                    users ( name )
                `)
                .order('created_at', { ascending: false });

            if (error) {

        async function initClientChat() {
            const urlParams = new URLSearchParams(window.location.search);
            const consultId = urlParams.get('c');
            
            if (!consultId) {
                alert("Consulta não encontrada.");
                window.location.href = window.location.pathname;
                return;
            }

            // Load consultation data
            const { data: consult, error } = await supabaseClient
                .from('consultas')
                .select('*, clients(*), users(*)')
                .eq('id', consultId)
                .single();

            if (error || !consult) {
                document.getElementById('client-loading').innerHTML = `<p class="text-red-500 font-bold">Erro: Atendimento não encontrado ou já finalizado.</p>`;
                return;
            }

            if (consult.status === 'finished') {
                document.getElementById('client-loading').innerHTML = `<p class="text-indigo-600 font-bold">Este atendimento já foi finalizado. Obrigado!</p>`;
                return;
            }

            document.getElementById('client-loading').classList.add('hidden');
            document.getElementById('client-chat-section').classList.remove('hidden');
            
            document.getElementById('client-tarologo-name').textContent = consult.users ? consult.users.name : 'Tarólogo';
            
            // Setup Timer
            const updateClientTimer = () => {
                const mins = Math.floor(consult.remaining_seconds / 60);
                const secs = consult.remaining_seconds % 60;
                document.getElementById('client-timer').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                
                // GERENCIAMENTO DA MENSAGEM DE ESPERA
                const waitingMsg = document.getElementById('client-waiting-msg');
                if (waitingMsg) {
                    if (consult.status === 'active') {
                        waitingMsg.remove(); // Remove do DOM para não voltar mais
                    } else {
                        waitingMsg.style.display = 'block';
                    }
                }
            };
            updateClientTimer();

            // Real-time Update for Timer and Status
            const clientConsultSub = supabaseClient
                .channel(`status_monitor_${consultId}`)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'consultas', filter: `id=eq.${consultId}` }, payload => {
                    console.log("SYNC DO BANCO (CLIENTE):", payload.new);
                    
                    const oldStatus = consult.status;
                    const newStatus = payload.new.status;
                    const dbSeconds = payload.new.remaining_seconds;
                    
                    // Notifica entrada do tarólogo se o status mudar para active
                    if (oldStatus !== 'active' && newStatus === 'active') {
                        addClientMessageToUI({
                            sender_name: 'SISTEMA',
                            text: '🌟 O tarólogo entrou na sala! Seu atendimento começou agora.',
                            created_at: new Date().toISOString()
                        }, 'system');
                    }

                    // ATUALIZAÇÃO DO CRONÔMETRO (INTELIGENTE)
                    consult.status = newStatus;
                    
                    // Só sobrescreve o tempo local se o status mudou ou se a diferença for absurda (> 30s)
                    // Isso garante que o contador local de 1 em 1s seja o soberano na tela do cliente
                    if (oldStatus !== newStatus || Math.abs(consult.remaining_seconds - dbSeconds) > 30) {
                        consult.remaining_seconds = dbSeconds;
                    }
                    
                    updateClientTimer();
                    
                    if (consult.status === 'finished') {
                        if (store.clientTimerInterval) clearInterval(store.clientTimerInterval);
                        alert("O atendimento foi encerrado. Obrigado!");
                        location.reload();
                    }
                })
                .subscribe((status) => {
                    console.log("Realtime Status Monitor (Cliente):", status);
                });

            // Cronômetro Local do Cliente (para o tempo descer de 1 em 1 segundo de forma fluida)
            if (store.clientTimerInterval) clearInterval(store.clientTimerInterval);
            store.clientTimerInterval = setInterval(() => {
                // SÓ conta se o status for 'active'
                if (consult.status === 'active' && consult.remaining_seconds > 0) {
                    consult.remaining_seconds--;
                    console.log("CONTAGEM LOCAL CLIENTE:", consult.remaining_seconds);
                    updateClientTimer();
                } else {
                    // Se não estiver ativo, garante que o timer reflita o valor atual
                    updateClientTimer();
                }
            }, 1000);

            // Chat History
            const chatBox = document.getElementById('client-messages');
            const loadClientMessages = async () => {
                const { data: consultData } = await supabaseClient.from('consultas').select('chat_log').eq('id', consultId).single();
                const messages = consultData ? (consultData.chat_log || []) : [];
                
                chatBox.innerHTML = '';
                
                // Reaplica a mensagem de espera se necessário
                const waitingMsg = document.createElement('div');
                waitingMsg.id = 'client-waiting-msg';
                waitingMsg.className = 'bg-indigo-50 border border-indigo-200 p-6 rounded-xl text-indigo-800 text-center shadow-sm';
                waitingMsg.innerHTML = `
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                        <i class="fas fa-magic text-indigo-600 text-xl animate-pulse"></i>
                    </div>
                    <h6 class="font-bold text-lg mb-2">Quase lá!</h6>
                    <p class="text-sm opacity-80 leading-relaxed">
                        O tarólogo foi notificado e já está acessando a sala.<br>
                        <span class="font-bold">Seu tempo só começará a contar quando o atendimento iniciar.</span>
                    </p>
                `;
                chatBox.appendChild(waitingMsg);
                
                messages.forEach(msg => addClientMessageToUI(msg, consult.client_id));
                updateClientTimer();
            };
            await loadClientMessages();

            // Real-time Chat (Sync with chat_log)
            const clientChatSub = supabaseClient
                .channel(`chat_messages_${consultId}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'consultas', 
                    filter: `id=eq.${consultId}` 
                }, payload => {
                    const newLog = payload.new.chat_log || [];
                    const oldLog = consult.chat_log || [];
                    if (newLog.length > oldLog.length) {
                        const newMessage = newLog[newLog.length - 1];
                        // Só mostra se for do tarólogo (evita duplicar o que eu acabei de enviar)
                        if (newMessage.sender_id !== consult.client_id) {
                            addClientMessageToUI(newMessage, consult.client_id);
                            consult.chat_log = newLog;
                        }
                    }
                })
                 .subscribe();
 
             // Finish Button for Client
             document.getElementById('client-finish-btn').onclick = async () => {
                 if (confirm('Deseja realmente encerrar a consulta agora?')) {
                     // Lógica de finalização (igual à do tarólogo para devolver minutos)
                     const remainingSeconds = consult.remaining_seconds;
                     const remainingMinutes = Math.floor(remainingSeconds / 60);
                     const usedMinutes = consult.minutes - remainingMinutes;

                     try {
                         if (remainingMinutes > 0) {
                             const { data: cData } = await supabaseClient.from('clients').select('balance').eq('id', consult.client_id).single();
                             if (cData) {
                                 await supabaseClient.from('clients').update({ balance: cData.balance + remainingMinutes }).eq('id', consult.client_id);
                             }
                         }
                         await supabaseClient.from('consultas').update({ 
                             status: 'finished', 
                             remaining_seconds: 0,
                             minutes: usedMinutes > 0 ? usedMinutes : 0,
                             ended_at: new Date().toISOString()
                         }).eq('id', consultId);
                         
                         alert("Consulta finalizada com sucesso.");
                         location.reload();
                     } catch (err) {
                         console.error(err);
                         alert("Erro ao finalizar: " + err.message);
                     }
                 }
             };
 
             // Send Message (Client)
            document.getElementById('client-chat-form').onsubmit = async (e) => {
                e.preventDefault();
                const input = document.getElementById('client-chat-input');
                const text = input.value.trim();
                if (!text) return;
                
                const clientName = (consult.clients && consult.clients.name) ? consult.clients.name : 'Cliente';
                const message = {
                    sender_id: consult.client_id,
                    sender_name: clientName,
                    text: text,
                    created_at: new Date().toISOString()
                };

                // Atualiza localmente e no banco
                consult.chat_log = consult.chat_log || [];
                consult.chat_log.push(message);
                addClientMessageToUI(message, consult.client_id);
                
                input.value = '';
                
                try {
                    await supabaseClient.from('consultas').update({ chat_log: consult.chat_log }).eq('id', consultId);
                } catch (err) {
                    console.error("Erro ao enviar mensagem do cliente:", err);
                }
            };
        }

        function addClientMessageToUI(msg, clientId) {
            const chatBox = document.getElementById('client-messages');
            
            if (clientId === 'system') {
                const sysDiv = document.createElement('div');
                sysDiv.className = 'w-full flex justify-center my-4';
                sysDiv.innerHTML = `<div class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full text-xs font-bold border border-indigo-100 shadow-sm">${msg.text}</div>`;
                chatBox.appendChild(sysDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
                return;
            }

            const isMe = msg.sender_id === clientId;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            msgDiv.innerHTML = `
                <div class="max-w-[85%] ${isMe ? 'bg-indigo-600 text-white rounded-l-xl rounded-tr-xl' : 'bg-white text-gray-800 border border-gray-100 rounded-r-xl rounded-tl-xl'} p-3 shadow-sm">
                    <p class="text-[9px] ${isMe ? 'text-indigo-200' : 'text-gray-400'} font-bold uppercase mb-1">${msg.sender_name}</p>
                    <p class="text-sm leading-relaxed">${msg.text}</p>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
