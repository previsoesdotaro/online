<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Tarot - Previsões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .sidebar { transition: all 0.3s; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        @keyframes pulse-status {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .status-pulse { animation: pulse-status 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-800">
            <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-indigo-900">Portal Tarot</h1>
                    <p class="text-gray-500">Acesse seu painel de atendimento</p>
                </div>
                <form id="login-form">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                        <input type="text" id="username" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Digite seu usuário" required>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                        <input type="password" id="password" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-md transition duration-200">
                        Entrar
                    </button>
                </form>
            </div>
        </div>

        <!-- Main Dashboard (Hidden by default) -->
        <div id="main-dashboard" class="hidden min-h-screen flex">
            <!-- Sidebar -->
            <div class="sidebar w-64 bg-indigo-900 text-white flex-shrink-0">
                <div class="p-6 text-center border-b border-indigo-800">
                    <h2 class="text-2xl font-bold">Painel de Tarot</h2>
                    <p id="user-role-display" class="text-xs text-indigo-300 mt-1 uppercase tracking-wider font-semibold"></p>
                    
                    <!-- Tarólogo Status Selector -->
                    <div id="status-selector-container" class="mt-4 hidden">
                        <div class="flex flex-col items-center gap-2">
                            <div class="flex items-center gap-2 px-3 py-1.5 bg-indigo-950 rounded-full border border-indigo-700 w-full justify-between group cursor-pointer relative" onclick="toggleStatusDropdown()">
                                <div class="flex items-center gap-2">
                                     <span id="user-status-indicator" class="w-3 h-3 rounded-full bg-gray-500"></span>
                                     <span id="user-status-text" class="text-[10px] font-bold uppercase">Offline</span>
                                 </div>
                                <i class="fas fa-chevron-down text-[10px] text-indigo-400 group-hover:text-white transition"></i>
                                
                                <!-- Dropdown -->
                                <div id="status-dropdown" class="absolute top-full left-0 right-0 mt-1 bg-indigo-900 border border-indigo-700 rounded-lg shadow-xl hidden z-50 overflow-hidden">
                                    <button onclick="updateUserStatus('online')" class="w-full px-4 py-2 text-left text-[10px] font-bold uppercase hover:bg-indigo-800 flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-green-500"></span> Online
                                    </button>
                                    <button onclick="updateUserStatus('busy')" class="w-full px-4 py-2 text-left text-[10px] font-bold uppercase hover:bg-indigo-800 flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-red-500"></span> Ocupado
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <nav class="mt-6">
                    <div id="admin-nav" class="hidden">
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3 active" data-view="admin-dashboard">
                            <i class="fas fa-chart-line"></i> Painel Principal
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="admin-clients">
                            <i class="fas fa-users"></i> Clientes
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="admin-tarologos">
                            <i class="fas fa-user-tie"></i> Tarólogos
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="admin-history">
                            <i class="fas fa-history"></i> Histórico
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="admin-cashflow">
                            <i class="fas fa-money-bill-wave"></i> Fluxo de Caixa
                        </a>
                    </div>
                    <div id="tarologo-nav" class="hidden">
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3 active" data-view="tarologo-consultas">
                            <i class="fas fa-list"></i> Minha Lista
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="tarologo-chat">
                            <i class="fas fa-comments"></i> Chat de Atendimento
                        </a>
                        <a href="#" class="nav-link block py-3 px-6 hover:bg-indigo-800 flex items-center gap-3" data-view="tarologo-history">
                            <i class="fas fa-history"></i> Meu Histórico
                        </a>
                    </div>
                    <div class="px-6 py-4 mt-6 border-t border-indigo-800">
                        <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1">Meus Ganhos (Mês)</p>
                        <p id="sidebar-earnings" class="text-xl font-bold text-green-400">R$ 0,00</p>
                    </div>
                    <a href="#" id="logout-btn" class="block py-3 px-6 hover:bg-red-800 text-red-300 mt-4 flex items-center gap-3">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </a>
                </nav>
            </div>

            <!-- Content Area -->
            <div class="flex-1 flex flex-col">
                <!-- Topbar -->
                <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
                    <h3 id="view-title" class="text-xl font-semibold text-gray-700">Dashboard</h3>
                    <div class="flex items-center gap-4">
                        <span id="current-user-name" class="font-medium">Admin</span>
                        <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                </header>

                <!-- Dynamic Content Views -->
                <main id="view-content" class="p-8 overflow-y-auto">
                    <!-- Views will be injected here -->
                </main>
            </div>
        </div>
    </div>

    <!-- Modals (Injected via JS) -->
    <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div id="modal-content" class="bg-white rounded-lg shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Template Views (Hidden) -->
    <template id="view-admin-dashboard">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-600">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Total de Clientes</p>
                <h4 class="text-3xl font-bold mt-1 text-blue-600" id="stat-total-clients">0</h4>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-600">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Consultas Hoje</p>
                <h4 class="text-3xl font-bold mt-1 text-green-600" id="stat-today-consults">0</h4>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-purple-600">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Tarólogos Ativos</p>
                <h4 class="text-3xl font-bold mt-1 text-purple-600" id="stat-online-tarologos">0</h4>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-blue-200">
            <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                <h4 class="font-bold text-lg">Últimas consultas realizadas</h4>
                <div class="flex gap-2">
                    <button onclick="renderView('admin-dashboard')" class="bg-blue-500 hover:bg-blue-400 px-3 py-1 rounded text-xs flex items-center gap-2">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                    <button onclick="openNewConsultationModal()" class="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded text-sm font-medium transition flex items-center gap-2">
                        <i class="fas fa-plus"></i> Nova Consulta
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px] border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-500 uppercase font-bold border-b">
                            <th class="px-4 py-2 border-r">ID</th>
                            <th class="px-4 py-2 border-r">CLIENTE / TARÓLOGO</th>
                            <th class="px-4 py-2 text-center border-r">INICIADA EM</th>
                            <th class="px-4 py-2 text-center border-r">DURAÇÃO</th>
                            <th class="px-4 py-2 text-center border-r">COMISSÃO</th>
                            <th class="px-4 py-2 text-center">STATUS / AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="admin-consultations-table" class="divide-y font-medium text-gray-700">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="view-admin-clients">
        <div class="bg-white rounded-lg shadow-sm border border-blue-200">
            <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                <h4 class="font-bold text-lg">Gerenciamento de Clientes</h4>
                <button onclick="openNewClientModal()" class="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded text-sm font-medium transition flex items-center gap-2">
                    <i class="fas fa-user-plus"></i> Adicionar Cliente
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold border-b">
                        <tr>
                            <th class="px-6 py-4">NOME</th>
                            <th class="px-6 py-4">CPF</th>
                            <th class="px-6 py-4">CONTATO</th>
                            <th class="px-6 py-4">SALDO (MIN)</th>
                            <th class="px-6 py-4">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="admin-clients-table" class="divide-y">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="view-admin-tarologos">
        <div class="bg-white rounded-lg shadow-sm border border-blue-200">
            <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                <h4 class="font-bold text-lg">Gerenciamento de Tarólogos</h4>
                <button onclick="openNewTarologoModal()" class="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded text-sm font-medium transition">
                    Adicionar Tarólogo
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold border-b">
                            <tr>
                                <th class="px-6 py-4">NOME</th>
                                <th class="px-6 py-4">USUÁRIO</th>
                                <th class="px-6 py-4">STATUS</th>
                                <th class="px-6 py-4">AÇÕES</th>
                            </tr>
                        </thead>
                    <tbody id="admin-tarologos-table" class="divide-y">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="view-admin-history">
        <div class="bg-white rounded-lg shadow-sm border border-blue-200">
            <div class="bg-blue-600 text-white p-4 rounded-t-lg">
                <h4 class="font-bold text-lg">Histórico de Consultas (Últimos 30 dias)</h4>
            </div>
            <div class="p-4 bg-gray-50 border-b">
                <input type="text" id="history-search" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Buscar por nome do cliente ou tarólogo...">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold border-b">
                        <tr>
                            <th class="px-6 py-4">DATA</th>
                            <th class="px-6 py-4">CLIENTE</th>
                            <th class="px-6 py-4">TARÓLOGO</th>
                            <th class="px-6 py-4">DURAÇÃO</th>
                            <th class="px-6 py-4 text-center">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="admin-history-table" class="divide-y">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="view-admin-cashflow">
        <div class="space-y-6">
            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-600">
                    <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Entrada Total (Mês)</p>
                    <h4 class="text-3xl font-bold mt-1 text-green-600" id="cashflow-total-revenue">R$ 0,00</h4>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-600">
                    <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Comissões Pagas (Mês)</p>
                    <h4 class="text-3xl font-bold mt-1 text-red-600" id="cashflow-total-commissions">R$ 0,00</h4>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-indigo-600">
                    <p class="text-xs text-gray-500 uppercase font-bold tracking-wider">Lucro Líquido (Mês)</p>
                    <h4 class="text-3xl font-bold mt-1 text-indigo-600" id="cashflow-net-profit">R$ 0,00</h4>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm border border-blue-200">
                <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                    <h4 class="font-bold text-lg">Fluxo de Caixa / Pagamentos</h4>
                    <button onclick="openNewPaymentModal()" class="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded text-sm font-medium transition flex items-center gap-2">
                        <i class="fas fa-plus"></i> Lançar Pagamento
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold border-b">
                            <tr>
                                <th class="px-6 py-4">DATA</th>
                                <th class="px-6 py-4">CLIENTE</th>
                                <th class="px-6 py-4">VALOR (R$)</th>
                                <th class="px-6 py-4">CRÉDITOS (MIN)</th>
                                <th class="px-6 py-4">FORMA DE PAGAMENTO</th>
                                <th class="px-6 py-4 text-center">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="admin-cashflow-table" class="divide-y">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="view-tarologo-consultas">
        <div class="space-y-6">
            <!-- Consultas em Andamento (Novo Estilo da Foto) -->
            <div id="active-consultations-section" class="bg-white rounded-lg shadow-sm border border-blue-200 hidden">
                <div class="bg-blue-600 text-white p-3 rounded-t-lg">
                    <h4 class="font-bold text-sm uppercase tracking-wider">Consultas em andamento</h4>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-gray-50 text-gray-400 uppercase font-bold border-b">
                            <tr>
                                <th class="px-4 py-3">ID</th>
                                <th class="px-4 py-3">CLIENTE</th>
                                <th class="px-4 py-3">INICIADO</th>
                                <th class="px-4 py-3">TEMPO DE CONSULTA</th>
                                <th class="px-4 py-3">CORTESIA</th>
                                <th class="px-4 py-3">PROMOÇÃO</th>
                                <th class="px-4 py-3">MIN. PRÉ-PAGO</th>
                                <th class="px-4 py-3">COMISSÃO</th>
                                <th class="px-4 py-3 text-center">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="tarologo-active-consultations-table" class="divide-y">
                            <!-- Injetado por JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Consultas em Aberto (Aguardando Início) -->
            <div class="bg-white rounded-lg shadow-sm border border-indigo-200">
                <div class="bg-indigo-600 text-white p-3 rounded-t-lg flex justify-between items-center">
                    <h4 class="font-bold text-sm uppercase tracking-wider">Novas Consultas para você</h4>
                    <button onclick="renderView('tarologo-consultas')" class="bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded text-xs flex items-center gap-2">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold border-b">
                            <tr>
                                <th class="px-6 py-4">CLIENTE</th>
                                <th class="px-6 py-4">TEMPO (MIN)</th>
                                <th class="px-6 py-4">TIPO</th>
                                <th class="px-6 py-4 text-center">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="tarologo-assigned-consultations" class="divide-y">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Metas / Comissões Section (Novo Layout conforme foto) -->
            <div class="bg-white rounded-lg shadow-sm border border-blue-200 overflow-hidden">
                <div class="bg-blue-600 text-white p-3">
                    <h4 class="font-bold text-sm uppercase tracking-wider">Metas</h4>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px] border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-500 uppercase font-bold border-b">
                                <th class="px-4 py-2 border-r">Comissões</th>
                                <th class="px-4 py-2 text-center bg-blue-600 text-white border-r">Mensal</th>
                                <th class="px-4 py-2 text-center border-r">Valor a Atingir</th>
                                <th class="px-4 py-2 text-center border-r">Valor Realizado</th>
                                <th class="px-4 py-2 text-center border-r">Valor Faltante</th>
                                <th class="px-4 py-2 text-center bg-blue-600 text-white border-r">Diário</th>
                                <th class="px-4 py-2 text-center border-r">Meta de Hoje</th>
                                <th class="px-4 py-2 text-center border-r">Valor Diário</th>
                                <th class="px-4 py-2 text-center">Valor Faltante</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y font-medium text-gray-700">
                            <tr class="hover:bg-gray-50">
                                <td class="px-4 py-3 border-r bg-gray-50">
                                    <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full text-[9px] font-black uppercase">TOTAL GERAL</span>
                                </td>
                                <td class="px-4 py-3 border-r bg-blue-50/30"></td>
                                <td id="goal-mensal-target" class="px-4 py-3 border-r text-center">R$ 0,00</td>
                                <td id="goal-mensal-realizado" class="px-4 py-3 border-r text-center font-bold text-blue-700">R$ 0,00</td>
                                <td id="goal-mensal-faltante" class="px-4 py-3 border-r text-center text-red-500">R$ 0,00</td>
                                <td class="px-4 py-3 border-r bg-blue-50/30"></td>
                                <td id="goal-diario-target" class="px-4 py-3 border-r text-center">R$ 0,00</td>
                                <td id="goal-diario-realizado" class="px-4 py-3 border-r text-center font-bold text-green-600">R$ 0,00</td>
                                <td id="goal-diario-faltante" class="px-4 py-3 text-center text-red-500">R$ 0,00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Últimas consultas realizadas (From Photo) -->
            <div class="mt-8 bg-white rounded-lg shadow-sm border border-blue-200 overflow-hidden">
                <div class="bg-blue-600 text-white p-3">
                    <h4 class="font-bold text-sm uppercase tracking-wider">Últimas consultas realizadas</h4>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px] border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-500 uppercase font-bold border-b">
                                <th class="px-4 py-2 border-r">ID</th>
                                <th class="px-4 py-2 border-r">CLIENTE</th>
                                <th class="px-4 py-2 text-center border-r">INICIADA EM</th>
                                <th class="px-4 py-2 text-center border-r">DURAÇÃO</th>
                                <th class="px-4 py-2 text-center">COMISSÃO</th>
                            </tr>
                        </thead>
                        <tbody id="tarologo-finished-consultations-table" class="divide-y font-medium text-gray-700">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <template id="view-tarologo-chat">
        <div id="no-active-consult" class="bg-white rounded-lg shadow-sm border border-gray-200 p-12 text-center text-gray-400 italic">
            Nenhuma consulta em andamento. Selecione uma na sua "Minha Lista" para começar.
        </div>
        
        <div id="active-consultation-section" class="hidden h-[calc(100vh-160px)] relative">
            <!-- Overlay para Iniciar Atendimento (Manual) -->

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://rtjgqfaphqkdbdzzytzw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ZxezFGN28TucGeZisbI7qQ_HcbU-CuA'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Data Store (using Supabase)
        const store = {
            clients: [],
            users: [],
            consultations: [],
            payments: [], // NOVO: Histórico de pagamentos
            currentUser: null,
            activeConsultation: null,
            timerInterval: null,
            clientTimerInterval: null,
            currentView: 'admin-dashboard',
            notificationSubscription: null
        };

        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        // Fetch Initial Data from Supabase
        async function loadInitialData() {
            try {
                const { data: clients } = await supabaseClient.from('clients').select('*');
                const { data: users } = await supabaseClient.from('users').select('*').order('name');
                const { data: consultations } = await supabaseClient.from('consultas').select('*');
                
                // Tenta carregar pagamentos se a tabela existir
                let payments = [];
                try {
                    const { data: pData, error: pError } = await supabaseClient.from('pagamentos').select('*').order('created_at', { ascending: false });
                    if (!pError) payments = pData || [];
                } catch (e) {
                    console.warn("Tabela 'pagamentos' não encontrada ou erro ao carregar. Criando fluxo local.", e);
                }

                store.clients = clients || [];
                store.users = users || [];
                store.consultations = consultations || [];
                store.payments = payments;
                
                // Refresh currentUser data from DB (Status and Goals)
                if (store.currentUser) {
                    const dbUser = store.users.find(u => u.id === store.currentUser.id);
                    if (dbUser) {
                        // Sincroniza status, metas e outros campos importantes
                        store.currentUser.status = dbUser.status || 'offline';
                        store.currentUser.monthly_goal = dbUser.monthly_goal || 0;
                        store.currentUser.daily_goal = dbUser.daily_goal || 0;
                        
                        localStorage.setItem('tarot_user', JSON.stringify(store.currentUser));
                    }
                }

                updateEarningsDisplay();
                
                // Se o administrador estiver na aba de tarólogos, atualiza a tabela
                if (store.currentUser && store.currentUser.role === 'admin') {
                    if (store.currentView === 'admin-tarologos') renderAdminTarologosTable();
                    if (store.currentView === 'admin-dashboard') renderAdminConsultationsTable();
                }
            } catch (err) {
                console.error("Erro ao carregar dados:", err);
            }
        }

        async function updateUserStatus(status) {
            if (!store.currentUser || store.currentUser.role !== 'tarologo') return;
            console.log(`Tentando atualizar status para: ${status}`);
            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ status: status })
                    .eq('id', store.currentUser.id);
                
                if (error) {
                    console.error("Erro Supabase ao atualizar status:", error);
                    throw error;
                }

                console.log("Status atualizado no banco com sucesso!");

                // Update local store
                store.currentUser.status = status;
                localStorage.setItem('tarot_user', JSON.stringify(store.currentUser));

                const userIdx = store.users.findIndex(u => u.id === store.currentUser.id);
                if (userIdx !== -1) store.users[userIdx].status = status;
                
                // Update UI indicators (Sidebar and Dashboard Card)
                updateStatusUI(status);

            } catch (err) {
                console.error("Erro ao atualizar status:", err);
            }
        }

        function updateStatusUI(status) {
            const colors = {
                'online': 'bg-green-500',
                'busy': 'bg-red-500',
                'offline': 'bg-gray-500'
            };
            const labels = {
                'online': 'Online',
                'busy': 'Ocupado',
                'offline': 'Offline'
            };

            // 1. Sidebar Indicator
            const sideIndicator = document.getElementById('user-status-indicator');
            const sideText = document.getElementById('user-status-text');
            if (sideIndicator) {
                sideIndicator.className = `w-3 h-3 rounded-full ${colors[status] || 'bg-gray-500'}`;
                if (status === 'online') sideIndicator.classList.add('status-pulse');
                else sideIndicator.classList.remove('status-pulse');
            }
            if (sideText) sideText.textContent = labels[status] || 'Offline';

            // 2. Dashboard Card Indicator (if present in current view)
            const cardIndicator = document.getElementById('card-status-indicator');
            const cardText = document.getElementById('card-status-text');
            const cardBtnGroup = document.getElementById('card-status-btns');

            if (cardIndicator) {
                cardIndicator.className = `w-4 h-4 rounded-full ${colors[status] || 'bg-gray-500'}`;
                if (status === 'online') cardIndicator.classList.add('status-pulse');
                else cardIndicator.classList.remove('status-pulse');
            }
            if (cardText) cardText.textContent = labels[status] || 'Offline';
            
            // Highlight active button in card
            if (cardBtnGroup) {
                cardBtnGroup.querySelectorAll('button').forEach(btn => {
                    const btnStatus = btn.getAttribute('data-status');
                    if (btnStatus === status) {
                        btn.classList.add('ring-2', 'ring-offset-2', 'ring-indigo-500', 'bg-indigo-50');
                    } else {
                        btn.classList.remove('ring-2', 'ring-offset-2', 'ring-indigo-500', 'bg-indigo-50');
                    }
                });
            }
        }

        // Handle window closing to set offline and finish active consultations
        window.addEventListener('beforeunload', (event) => {
            if (store.currentUser && store.currentUser.role === 'tarologo') {
                if (store.activeConsultation) {
                    // Tenta finalizar a consulta se estiver saindo com uma ativa
                    // Como é async, pode não terminar, mas o Supabase é rápido.
                    finishConsultation();
                }
                updateUserStatus('offline');
            }
        });

        function updateEarningsDisplay() {
            if (!store.currentUser || store.currentUser.role !== 'tarologo') return;
            
            const myFinishedConsults = store.consultations.filter(c => 
                c.tarologo_id === store.currentUser.id && 
                c.status === 'finished'
            );
            
            // Lógica de Comissão: R$ 0,50 por minuto
            const calculateEarnings = (consults) => consults.reduce((acc, c) => acc + (c.minutes || 0) * 0.50, 0);

            // 1. Total Mensal (Apenas finalizadas no mês atual)
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            
            const mensalConsults = myFinishedConsults.filter(c => {
                const date = new Date(c.created_at);
                return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
            });
            const mensalEarnings = calculateEarnings(mensalConsults);
            
            // 2. Total Diário (Apenas as finalizadas hoje)
            const todayStr = now.toLocaleDateString('pt-BR');
            const dailyConsults = myFinishedConsults.filter(c => {
                const date = new Date(c.created_at);
                return date.toLocaleDateString('pt-BR') === todayStr;
            });
            const dailyEarnings = calculateEarnings(dailyConsults);

            // Metas Dinâmicas (Vem do Banco de Dados)
            const META_MEN_VALOR = parseFloat(store.currentUser.monthly_goal || 0);
            
            // CÁLCULO AUTOMÁTICO DA META DE HOJE (Baseado no mensal e dias restantes)
            const lastDayOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const daysRemaining = lastDayOfMonth - now.getDate() + 1; // Incluindo hoje
            
            // Ganhos do mês até ontem (para saber quanto falta para os dias que restam)
            const earningsUntilYesterday = mensalEarnings - dailyEarnings;
            
            // Meta Diária necessária para atingir o mensal até o fim do mês
            // Fórmula: (Meta Mensal - Ganhos acumulados até ontem) / Dias que restam no mês
            const META_DIA_VALOR = Math.max(0, (META_MEN_VALOR - earningsUntilYesterday) / daysRemaining);

            // Atualiza Sidebar
            const display = document.getElementById('sidebar-earnings');
            if (display) display.textContent = `R$ ${mensalEarnings.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            
            // Atualiza Tabela de Metas (Novo Layout)
            const goalMensalRealizado = document.getElementById('goal-mensal-realizado');
            const goalMensalFaltante = document.getElementById('goal-mensal-faltante');
            const goalDiarioRealizado = document.getElementById('goal-diario-realizado');
            const goalDiarioFaltante = document.getElementById('goal-diario-faltante');
            
            // Atualiza labels de meta na tabela
            const metaMensalTarget = document.getElementById('goal-mensal-target');
            const metaDiariaTarget = document.getElementById('goal-diario-target');
            
            if (metaMensalTarget) {
                metaMensalTarget.textContent = `R$ ${META_MEN_VALOR.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            }
            if (metaDiariaTarget) {
                metaDiariaTarget.textContent = `R$ ${META_DIA_VALOR.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            }

            if (goalMensalRealizado) {
                goalMensalRealizado.textContent = `R$ ${mensalEarnings.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                const faltanteMensal = Math.max(0, META_MEN_VALOR - mensalEarnings);
                goalMensalFaltante.textContent = `R$ ${faltanteMensal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                goalMensalFaltante.className = `px-4 py-3 border-r text-center ${faltanteMensal === 0 && META_MEN_VALOR > 0 ? 'text-green-600 font-bold' : 'text-red-500'}`;
            }

            if (goalDiarioRealizado) {
                goalDiarioRealizado.textContent = `R$ ${dailyEarnings.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                const faltanteDiario = Math.max(0, META_DIA_VALOR - dailyEarnings);
                goalDiarioFaltante.textContent = `R$ ${faltanteDiario.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                goalDiarioFaltante.className = `px-4 py-3 text-center ${faltanteDiario === 0 && META_DIA_VALOR > 0 ? 'text-green-600 font-bold' : 'text-red-500'}`;
            }
        }

        // Auth Logic
        async function checkPersistedLogin() {
            // Check if it's a client access first
            const urlParams = new URLSearchParams(window.location.search);
            const consultationId = urlParams.get('c');
            
            if (consultationId) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                // Hide sidebar for clients
                document.querySelector('.sidebar').classList.add('hidden');
                document.querySelector('header').classList.add('hidden');
                renderView('client-chat');
                return;
            }

            const savedUser = localStorage.getItem('tarot_user');
            if (savedUser) {
                store.currentUser = JSON.parse(savedUser);
                showDashboard();
            }
        }
        checkPersistedLogin();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const submitBtn = e.target.querySelector('button');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Entrando...';

            try {
                // Query case-insensitive for username but exact for password
                const { data: user, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .ilike('username', username)
                    .eq('password', password)
                    .single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        alert('Usuário ou senha incorretos! Verifique se digitou corretamente.');
                    } else {
                        console.error("Erro no Login:", error);
                        alert('Erro de conexão com o Banco: ' + error.message);
                    }
                    return;
                }

                if (user) {
                    store.currentUser = user;
                    localStorage.setItem('tarot_user', JSON.stringify(user));
                    
                    // Explicitly set to online on fresh login
                    if (user.role === 'tarologo') {
                        await updateUserStatus('online');
                    }
                    
                    showDashboard();
                }
            } catch (err) {
                alert('Erro inesperado: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            if (store.currentUser && store.currentUser.role === 'tarologo') {
                await updateUserStatus('offline');
            }
            store.currentUser = null;
            localStorage.removeItem('tarot_user');
            if (store.timerInterval) clearInterval(store.timerInterval);
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        });

        async function showDashboard() {
            await loadInitialData();
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('current-user-name').textContent = store.currentUser.name;
            
            // Map role to Portuguese
            const roleMap = {
                'admin': 'Administrador',
                'tarologo': 'Tarólogo'
            };
            document.getElementById('user-role-display').textContent = roleMap[store.currentUser.role] || store.currentUser.role;

            // Start Realtime Monitors
            if (store.currentUser.role === 'admin') {
                startAdminStatusMonitor(); // NEW: Monitor statuses globally for Admin
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('tarologo-nav').classList.add('hidden');

        function startAdminStatusMonitor() {
            if (store.statusSubscription) supabaseClient.removeChannel(store.statusSubscription);
            
            console.log("Iniciando monitor de status global para o Administrador...");
            
            store.statusSubscription = supabaseClient
                .channel('admin_global_status')
                // 1. Monitora status dos usuários (online/offline/ocupado)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'users'
                }, payload => {
                    console.log("STATUS UPDATE RECEIVED (GLOBAL ADMIN):", payload.new);
                    
                    const userIdx = store.users.findIndex(u => u.id === payload.new.id);
                    if (userIdx !== -1) {
                        store.users[userIdx] = payload.new;
                        
                        if (store.currentView === 'admin-dashboard') {
                            const activeCount = store.users.filter(u => u.role === 'tarologo' && u.status === 'online').length;
                            const statEl = document.getElementById('stat-online-tarologos');
                            if (statEl) statEl.textContent = activeCount;
                            
                            // Também re-renderiza a tabela para atualizar nomes/status se necessário
                            initAdminDashboard();
                        } else if (store.currentView === 'admin-tarologos') {
                            renderAdminTarologosTable();
                        }
                    }
                })
                // 2. Monitora status das consultas (Aguardando -> Em Atendimento)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'consultas'
                }, payload => {
                    console.log("CONSULTA UPDATE RECEIVED (GLOBAL ADMIN):", payload.new);
                    
                    const consultIdx = store.consultations.findIndex(c => c.id === payload.new.id);
                    if (consultIdx !== -1) {
                        store.consultations[consultIdx] = payload.new;
                    } else {
                        store.consultations.push(payload.new);
                    }

                    if (store.currentView === 'admin-dashboard') {
                        initAdminDashboard();
                    }
                })
                // 3. Monitora NOVAS consultas
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'consultas'
                }, payload => {
                    console.log("NOVA CONSULTA RECEBIDA (GLOBAL ADMIN):", payload.new);
                    store.consultations.push(payload.new);
                    if (store.currentView === 'admin-dashboard') {
                        initAdminDashboard();
                    }
                })
                .subscribe();
        }

        function toggleStatusDropdown() {
            const dropdown = document.getElementById('status-dropdown');
            dropdown.classList.toggle('hidden');
            
            // Close dropdown when clicking outside
            const closeDropdown = (e) => {
                if (!e.target.closest('#status-selector-container')) {

                    document.removeEventListener('click', closeDropdown);
                }
            };
            if (!dropdown.classList.contains('hidden')) {
                setTimeout(() => document.addEventListener('click', closeDropdown), 10);
            }

        function startNotificationMonitor() {
            if (!store.currentUser) return;
            if (store.notificationSubscription) supabaseClient.removeChannel(store.notificationSubscription);
            
            console.log("Iniciando monitor de notificações para o tarólogo:", store.currentUser.id);

            // Monitor for NEW consultations assigned to THIS tarologist
            store.notificationSubscription = supabaseClient
                .channel('new_consultations_channel')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'consultas',
                    filter: `tarologo_id=eq.${store.currentUser.id}`
                }, async (payload) => {
                    console.log("NOVA CONSULTA RECEBIDA EM TEMPO REAL:", payload);
                    
                    if (payload.new.status === 'pending') {
                        // Tentar tocar som
                        notificationSound.currentTime = 0;
                        notificationSound.play().then(() => {
                            console.log("Som de notificação tocado!");
                        }).catch(e => {
                            console.warn("Som bloqueado pelo navegador. Clique na página uma vez para autorizar sons.", e);
                        });
                        
                        // Notificação do navegador
                        if (Notification.permission === "granted") {
                            new Notification("Nova Consulta!", { 
                                body: "Você recebeu um atendimento de " + (payload.new.type === 'phone' ? 'Telefone' : 'Chat'),
                                icon: 'https://cdn-icons-png.flaticon.com/512/107/107831.png'

                            renderView('tarologo-consultas');

                    }
                })
                .subscribe((status) => {
                    console.log("Status da conexão Realtime:", status);

        async function initAdminHistory() {
            const tableBody = document.getElementById('admin-history-table');
            tableBody.innerHTML = '<tr><td colspan="5" class="text-center p-8"><i class="fas fa-spinner fa-spin text-2xl text-indigo-600"></i></td></tr>';

            const { data: consultations, error } = await supabaseClient
                .from('consultas')
                .select(`
                    id, created_at, ended_at, client_name, minutes, status,
                    users ( name )
                `)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Erro ao buscar histórico:', error);
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center p-8 text-red-500">Erro ao carregar o histórico.</td></tr>';
                return;
            }

            renderHistoryTable(consultations);

            const searchInput = document.getElementById('history-search');
            searchInput.addEventListener('keyup', () => {
                const searchTerm = searchInput.value.toLowerCase();
                const filteredConsultas = consultations.filter(c => 
                    (c.client_name && c.client_name.toLowerCase().includes(searchTerm)) || 
                    (c.users && c.users.name.toLowerCase().includes(searchTerm))
                );
                renderHistoryTable(filteredConsultas);
            });
        }

        function renderHistoryTable(consultations) {
            const tableBody = document.getElementById('admin-history-table');
            if (!consultations || consultations.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center p-8 text-gray-500">Nenhum registro de consulta encontrado.</td></tr>';
                return;
            }

            tableBody.innerHTML = consultations.map(c => {
                const startDate = new Date(c.created_at);
                const endDate = c.ended_at ? new Date(c.ended_at) : null;
                
                // Cálculo original: Diferença entre fim e início
                let durationCalculada = c.minutes || 0;
                if (endDate) {
                    durationCalculada = Math.max(0, Math.round((endDate - startDate) / (1000 * 60)));
                }
                const durationStr = c.status === 'finished' ? `${durationCalculada} min` : 'Em andamento';

                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${startDate.toLocaleString('pt-BR')}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-800">${c.client_name || 'N/A'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${c.users ? c.users.name : 'Não encontrado'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${durationStr}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="viewChatLog('${c.id}')" class="text-indigo-600 hover:text-indigo-900 text-sm font-medium">Ver Chat</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function viewChatLog(consultaId) {
            openModal('<i class="fas fa-spinner fa-spin"></i> Carregando...');
            const { data: consulta, error } = await supabaseClient
                .from('consultas')
                .select('chat_log')
                .eq('id', consultaId)
                .single();

            if (error || !consulta) {
                document.getElementById('modal-body').innerHTML = '<p class="text-red-500">Erro ao carregar o chat.</p>';
                return;
            }

            let chatHTML = '<div class="space-y-4">';
            if (consulta.chat_log && consulta.chat_log.length > 0) {
                consulta.chat_log.forEach(msg => {
                    const msgDate = new Date(msg.created_at);
                    const formattedTime = `${msgDate.getHours().toString().padStart(2, '0')}:${msgDate.getMinutes().toString().padStart(2, '0')}`;
                    const isTarologo = msg.sender_id === 'tarologo'; // Assumindo que o log salva quem enviou
                    
                    chatHTML += `
                        <div class="p-3 rounded-lg ${isTarologo ? 'bg-indigo-50' : 'bg-gray-100'}">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-sm ${isTarologo ? 'text-indigo-700' : 'text-gray-700'}">${msg.sender_name}</span>
                                <span class="text-xs text-gray-400">${formattedTime}</span>
                            </div>
                            <p class="text-gray-800">${msg.text}</p>
                        </div>
                    `;
                });
            } else {
                chatHTML += '<p>Nenhuma mensagem registrada para esta consulta.</p>';
            }
            chatHTML += '</div>';

            document.getElementById('modal-body').innerHTML = chatHTML;
        }

        async function initAdminCashFlow() {
            const tableBody = document.getElementById('admin-cashflow-table');
            if (!tableBody) return;

            tableBody.innerHTML = '<tr><td colspan="5" class="text-center p-8"><i class="fas fa-spinner fa-spin text-2xl text-indigo-600"></i></td></tr>';

            // Recarrega dados de pagamentos e consultas para contabilidade
            let payments = [];
            try {
                const { data: pData, error: pError } = await supabaseClient.from('pagamentos').select('*').order('created_at', { ascending: false });
                if (!pError) payments = pData || [];
            } catch (e) { console.warn(e); }

            const { data: consultations } = await supabaseClient.from('consultas').select('*').eq('status', 'finished');
            
            store.payments = payments;
            store.consultations = consultations || [];

            // Filtra por mês atual para o resumo
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const monthlyPayments = store.payments.filter(p => {
                const d = new Date(p.created_at);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            const monthlyConsultations = store.consultations.filter(c => {
                const d = new Date(c.created_at);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            // Cálculos
            const totalRevenue = monthlyPayments.reduce((acc, p) => acc + (p.amount || 0), 0);
            const totalCommissions = monthlyConsultations.reduce((acc, c) => {
                const start = new Date(c.created_at);
                const end = new Date(c.ended_at);
                const duracao = Math.max(0, Math.round((end - start) / (1000 * 60)));
                return acc + (duracao * 0.50);
            }, 0);
            const netProfit = totalRevenue - totalCommissions;

            // Atualiza Cards de Resumo
            const revEl = document.getElementById('cashflow-total-revenue');
            const comEl = document.getElementById('cashflow-total-commissions');
            const netEl = document.getElementById('cashflow-net-profit');

            if (revEl) revEl.textContent = `R$ ${totalRevenue.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            if (comEl) comEl.textContent = `R$ ${totalCommissions.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            if (netEl) netEl.textContent = `R$ ${netProfit.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;

            // Renderiza Tabela
            if (store.payments.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-gray-500 italic">Nenhum pagamento registrado. Verifique se a tabela "pagamentos" existe.</td></tr>';
                return;
            }

            tableBody.innerHTML = store.payments.map(p => {
                const client = store.clients.find(c => c.id === p.client_id);
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${new Date(p.created_at).toLocaleString('pt-BR')}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-800">${client ? client.name : 'N/A'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-green-600">R$ ${p.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${p.credits_added} min</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase bg-blue-100 text-blue-700">${p.method}</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="openEditPaymentModal('${p.id}')" class="text-blue-600 hover:text-blue-900 transition-all p-2 bg-blue-50 rounded-lg border border-blue-100">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function openEditPaymentModal(paymentId) {
            const payment = store.payments.find(p => p.id === paymentId);
            if (!payment) return;

            const modalHtml = `
                <div id="payment-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                        <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
                            <h3 class="font-bold flex items-center gap-2"><i class="fas fa-edit"></i> Editar Lançamento</h3>

                        <form id="edit-payment-form" class="p-6 space-y-4">

                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Valor (R$)</label>

                                <div>
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Créditos (Minutos)</label>
                                    <input type="number" id="edit-payment-credits" class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" value="${payment.credits_added}" required>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Forma de Pagamento</label>
                                <select id="edit-payment-method" class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" required>
                                    <option value="DÉBITO" ${payment.method === 'DÉBITO' ? 'selected' : ''}>Cartão de Débito</option>
                                    <option value="CRÉDITO" ${payment.method === 'CRÉDITO' ? 'selected' : ''}>Cartão de Crédito</option>
                                    <option value="LINK" ${payment.method === 'LINK' ? 'selected' : ''}>Link de Pagamento</option>
                                    <option value="TRANSFERÊNCIA" ${payment.method === 'TRANSFERÊNCIA' ? 'selected' : ''}>Transferência / PIX</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transition-all active:scale-95 mt-2">
                                SALVAR ALTERAÇÕES
                            </button>
                            <div class="pt-4 mt-4 border-t border-gray-100">
                                <button type="button" id="refund-payment-btn" class="w-full bg-red-50 text-red-600 font-bold py-2 rounded-lg border border-red-100 hover:bg-red-100 transition-all text-xs flex items-center justify-center gap-2">
                                    <i class="fas fa-undo"></i> ESTORNAR PAGAMENTO (DEVOLVER CRÉDITOS)
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);

            // Lógica do botão de Estorno
            document.getElementById('refund-payment-btn').onclick = async () => {
                const client = store.clients.find(c => c.id === payment.client_id);
                if (!confirm(`Deseja realmente ESTORNAR este pagamento?\n\nIsso removerá ${payment.credits_added} minutos do saldo de ${client?.name || 'N/A'} e apagará o registro do fluxo de caixa.`)) {
                    return;
                }

                const btn = document.getElementById('refund-payment-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processando Estorno...';

                try {
                    // 1. Remover créditos do saldo do cliente
                    const newBalance = Math.max(0, (client.balance || 0) - payment.credits_added);
                    const { error: clientError } = await supabaseClient
                        .from('clients')
                        .update({ balance: newBalance })
                        .eq('id', payment.client_id);

                    if (clientError) throw clientError;

                    // 2. Apagar registro de pagamento
                    const { error: paymentError } = await supabaseClient
                        .from('pagamentos')
                        .delete()
                        .eq('id', paymentId);

                    if (paymentError) throw paymentError;

                    alert('Estorno realizado com sucesso! Os créditos foram removidos do cliente.');
                    closePaymentModal();
                    await loadInitialData();
                    initAdminCashFlow();
                } catch (err) {
                    console.error("Erro ao estornar pagamento:", err);
                    alert("Erro ao realizar estorno: " + (err.message || "Erro desconhecido."));
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-undo"></i> ESTORNAR PAGAMENTO (DEVOLVER CRÉDITOS)';
                }
            };

            document.getElementById('edit-payment-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Salvando...';

                const newAmount = parseFloat(document.getElementById('edit-payment-amount').value);
                const newCredits = parseInt(document.getElementById('edit-payment-credits').value);
                const newMethod = document.getElementById('edit-payment-method').value;

                try {
                    // 1. Calcular diferença de créditos para ajustar o saldo do cliente
                    const creditDiff = newCredits - payment.credits_added;
                    
                    if (creditDiff !== 0) {
                        const client = store.clients.find(c => c.id === payment.client_id);
                        const newBalance = (client.balance || 0) + creditDiff;
                        
                        const { error: clientError } = await supabaseClient
                            .from('clients')
                            .update({ balance: newBalance })
                            .eq('id', payment.client_id);

                        if (clientError) throw clientError;
                    }

                    // 2. Atualizar Registro de Pagamento
                    const { error: paymentError } = await supabaseClient
                        .from('pagamentos')
                        .update({
                            amount: newAmount,
                            credits_added: newCredits,
                            method: newMethod
                        })
                        .eq('id', paymentId);

                    if (paymentError) throw paymentError;

                    alert('Lançamento corrigido com sucesso!');
                    closePaymentModal();
                    await loadInitialData();
                    initAdminCashFlow();
                } catch (err) {
                    console.error("Erro ao editar pagamento:", err);
                    alert("Erro ao salvar alterações: " + (err.message || "Erro desconhecido."));
                    btn.disabled = false;
                    btn.textContent = 'SALVAR ALTERAÇÕES';
                }
            };
        }

                try {

                    const { error: clientError } = await supabaseClient

                    const { error: paymentError } = await supabaseClient
